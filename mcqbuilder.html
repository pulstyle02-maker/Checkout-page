<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBBS MCQ Master Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .tab-active { border-bottom: 3px solid #6366f1; color: #6366f1; }
        .modal-overlay { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto space-y-8">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg">
                    <i data-lucide="database" class="w-8 h-8"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-black tracking-tight text-slate-800">MCQ Master Processor</h1>
                    <p class="text-slate-500 font-medium">Tag, Parse & Export Medical Question Banks</p>
                </div>
            </div>
            <div class="bg-white px-5 py-3 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-6">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></div>
                    <span id="entry-count" class="text-sm font-bold text-slate-700">0 Staged</span>
                </div>
                <div id="stats-counter" class="hidden md:flex gap-4 text-[10px] font-black uppercase text-slate-400 border-l pl-6 border-slate-100">
                    <span class="text-green-500">Easy: <span id="stat-easy">0</span></span>
                    <span class="text-orange-500">Med: <span id="stat-med">0</span></span>
                    <span class="text-red-500">Hard: <span id="stat-hard">0</span></span>
                </div>
            </div>
        </header>

        <!-- Tabs -->
        <nav class="flex border-b border-slate-200 gap-8">
            <button onclick="switchTab('builder')" id="tab-btn-builder" class="pb-4 text-sm font-bold transition-all tab-active">MCQ Parser</button>
            <button onclick="switchTab('history')" id="tab-btn-history" class="pb-4 text-sm font-bold text-slate-400 transition-all hover:text-slate-600">Session History</button>
        </nav>

        <div id="tab-content-builder" class="space-y-8">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- LEFT: META DATA -->
                <div class="lg:col-span-4 space-y-6">
                    <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 space-y-5">
                        <h2 class="text-xl font-bold flex items-center gap-2 text-indigo-600">
                            <i data-lucide="tag" class="w-5 h-5"></i> Context Tags
                        </h2>
                        
                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-1">
                                    <label class="text-[10px] font-black text-slate-400 uppercase">Year</label>
                                    <select id="input-year" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500">
                                        <option>1st Year</option><option>2nd Year</option><option>3rd Year</option><option>4th Year</option><option>Final Year</option>
                                    </select>
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[10px] font-black text-slate-400 uppercase">Block</label>
                                    <select id="input-block" onchange="renderModules()" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500"></select>
                                </div>
                            </div>

                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-slate-400 uppercase">Module Name</label>
                                <select id="input-module-select" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500"></select>
                                <input type="text" id="input-custom-module" placeholder="Or type new module..." class="mt-2 w-full p-2 text-xs border rounded-lg">
                            </div>

                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-slate-400 uppercase">Subject</label>
                                <select id="input-subject" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500"></select>
                                <input type="text" id="input-custom-subject" placeholder="Or type new subject..." class="mt-2 w-full p-2 text-xs border rounded-lg">
                            </div>
                        </div>
                    </section>

                    <section class="bg-indigo-900 p-6 rounded-3xl shadow-xl text-white space-y-4">
                        <h2 class="text-lg font-bold flex items-center gap-2">
                            <i data-lucide="upload" class="w-5 h-5"></i> Import JSON
                        </h2>
                        <textarea id="import-area" placeholder="Paste existing MCQ JSON..." class="w-full h-32 p-3 bg-indigo-800/50 border border-indigo-700 rounded-xl text-xs font-mono outline-none"></textarea>
                        <button onclick="importJSON()" class="w-full py-2 bg-white text-indigo-900 rounded-xl font-bold hover:bg-indigo-50">Load for Editing</button>
                    </section>
                </div>

                <!-- RIGHT: PARSER -->
                <div class="lg:col-span-8 space-y-6">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 space-y-6">
                        <div class="flex justify-between items-center">
                            <h2 class="text-xl font-bold text-slate-800">Raw MCQ Input</h2>
                            <div id="parse-status" class="text-[10px] font-black text-indigo-500 hidden bg-indigo-50 px-3 py-1 rounded-full uppercase">Duplicates Cleaned</div>
                        </div>
                        <div class="space-y-4">
                            <textarea id="raw-mcq-input" oninput="updateLiveStats()" class="w-full h-64 p-4 bg-slate-50 border-none rounded-2xl ring-1 ring-slate-200 outline-none font-mono text-xs" placeholder="[LO]: HL-Pa-001...&#10;[SRC]: Robbins...&#10;[DIFF]: Easy...&#10;[Q]: Question?...&#10;[A]: Option...&#10;[ANS]: B..."></textarea>
                            <button onclick="processMCQs()" class="w-full py-4 bg-slate-800 text-white rounded-2xl font-black text-lg hover:bg-slate-700 transition-all shadow-xl">
                                Parse & Validate Questions
                            </button>
                        </div>

                        <div id="parsed-preview-container" class="space-y-4 pt-4 border-t border-slate-100 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar hidden">
                            <!-- Preview cards injected here -->
                        </div>
                        
                        <div id="stage-btn-container" class="pt-6 hidden">
                            <button onclick="saveToSession()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black text-lg flex items-center justify-center gap-3 shadow-xl hover:bg-indigo-700 transition-all">
                                <i data-lucide="save" class="w-6 h-6"></i> Stage to Session
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- REVIEW & FILTERING -->
            <section id="review-section" class="hidden bg-slate-900 rounded-[40px] p-8 md:p-12 text-white space-y-8 shadow-2xl">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                    <div>
                        <h2 class="text-3xl font-black">Final Bank Review</h2>
                        <div class="flex flex-wrap gap-4 mt-4">
                            <select id="filter-module" onchange="renderSession()" class="bg-slate-800 border-none rounded-lg text-xs p-2 text-slate-300 ring-1 ring-slate-700"><option value="">All Modules</option></select>
                            <select id="filter-subject" onchange="renderSession()" class="bg-slate-800 border-none rounded-lg text-xs p-2 text-slate-300 ring-1 ring-slate-700"><option value="">All Subjects</option></select>
                            <select id="filter-diff" onchange="renderSession()" class="bg-slate-800 border-none rounded-lg text-xs p-2 text-slate-300 ring-1 ring-slate-700"><option value="">All Difficulties</option><option>Easy</option><option>Medium</option><option>Hard</option></select>
                        </div>
                    </div>
                    <div class="flex gap-4">
                        <button onclick="resetSession()" class="px-6 py-4 rounded-2xl border border-slate-700 text-slate-400 hover:text-red-400 transition-all font-bold">Clear All</button>
                        <button onclick="copyMasterJSON()" class="px-10 py-4 bg-indigo-500 hover:bg-indigo-400 text-white rounded-2xl font-black text-xl flex items-center gap-3 transition-all">
                            <i data-lucide="file-json" class="w-6 h-6"></i> COPY JSON
                        </button>
                    </div>
                </div>

                <div id="session-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- MCQ Cards -->
                </div>
            </section>
        </div>

        <!-- HISTORY -->
        <div id="tab-content-history" class="hidden space-y-6">
            <div class="bg-white p-8 rounded-[40px] border border-slate-200 shadow-sm space-y-6">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-black">Session Archive</h2>
                    <button onclick="saveCurrentToHistory()" class="px-6 py-3 bg-indigo-50 text-indigo-600 rounded-xl font-bold">Archive Current Bank</button>
                </div>
                <div id="history-list" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="fixed inset-0 z-50 flex items-center justify-center modal-overlay hidden">
        <div class="bg-white w-full max-w-2xl mx-4 p-8 rounded-3xl shadow-2xl space-y-6 max-h-[90vh] overflow-y-auto custom-scrollbar">
            <div class="flex justify-between items-center">
                <h3 class="text-2xl font-black">Edit MCQ</h3>
                <button onclick="closeEditModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Question</label>
                    <textarea id="edit-q" class="w-full p-3 bg-slate-50 border rounded-xl text-sm min-h-[100px]"></textarea>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase">A</label><input id="edit-a" class="w-full p-2 bg-slate-50 border rounded-lg text-xs"></div>
                    <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase">B</label><input id="edit-b" class="w-full p-2 bg-slate-50 border rounded-lg text-xs"></div>
                    <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase">C</label><input id="edit-c" class="w-full p-2 bg-slate-50 border rounded-lg text-xs"></div>
                    <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase">D</label><input id="edit-d" class="w-full p-2 bg-slate-50 border rounded-lg text-xs"></div>
                    <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase">E</label><input id="edit-e" class="w-full p-2 bg-slate-50 border rounded-lg text-xs"></div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Correct Answer</label>
                        <select id="edit-ans" class="w-full p-2 bg-slate-50 border rounded-lg text-xs"><option>A</option><option>B</option><option>C</option><option>D</option><option>E</option></select>
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Explanation</label>
                    <textarea id="edit-exp" class="w-full p-3 bg-slate-50 border rounded-xl text-sm"></textarea>
                </div>
                <button onclick="commitEdit()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const MBBS_SUBJECTS = ["General Anatomy", "Embryology", "Histology", "Physiology", "Biochemistry", "Pathology", "Microbiology", "Pharmacology", "Community Medicine", "Medicine", "Surgery"];
        const PREDEFINED_MODULES = { "1": ["Foundation-I", "Hematology"], "7": ["Foundation-II", "General Pharmacology"] };

        let state = {
            session: JSON.parse(localStorage.getItem('mcq_session') || '[]'),
            history: JSON.parse(localStorage.getItem('mcq_history') || '[]'),
            customModules: JSON.parse(localStorage.getItem('mcq_custom_mods') || '{}'),
            customSubjects: JSON.parse(localStorage.getItem('mcq_custom_subs') || '[]'),
            stagedQuestions: [],
            editingQuestionId: null
        };

        function init() {
            const blockSelect = document.getElementById('input-block');
            for(let i=1; i<=15; i++) {
                const opt = document.createElement('option');
                opt.value = i; opt.textContent = `Block ${i}`;
                blockSelect.appendChild(opt);
            }
            renderModules();
            renderSubjects();
            renderSession();
            renderHistory();
            lucide.createIcons();
        }

        function switchTab(tab) {
            document.getElementById('tab-content-builder').classList.toggle('hidden', tab !== 'builder');
            document.getElementById('tab-content-history').classList.toggle('hidden', tab !== 'history');
            document.getElementById('tab-btn-builder').classList.toggle('tab-active', tab === 'builder');
            document.getElementById('tab-btn-history').classList.toggle('tab-active', tab === 'history');
        }

        function renderModules() {
            const block = document.getElementById('input-block').value;
            const sel = document.getElementById('input-module-select');
            sel.innerHTML = '';
            const mods = [...(PREDEFINED_MODULES[block] || []), ...(state.customModules[block] || [])];
            mods.forEach(m => sel.add(new Option(m, m)));
        }

        function renderSubjects() {
            const sel = document.getElementById('input-subject');
            sel.innerHTML = '';
            [...MBBS_SUBJECTS, ...state.customSubjects].forEach(s => sel.add(new Option(s, s)));
        }

        function updateLiveStats() {
            const raw = document.getElementById('raw-mcq-input').value;
            const easy = (raw.match(/\[DIFF\]:\s*Easy/gi) || []).length;
            const med = (raw.match(/\[DIFF\]:\s*Medium/gi) || []).length;
            const hard = (raw.match(/\[DIFF\]:\s*Hard/gi) || []).length;
            const total = easy + med + hard;

            if(total > 0) {
                document.getElementById('stats-counter').classList.remove('hidden');
                document.getElementById('stat-easy').textContent = easy;
                document.getElementById('stat-med').textContent = med;
                document.getElementById('stat-hard').textContent = hard;
            } else {
                document.getElementById('stats-counter').classList.add('hidden');
            }
        }

        // New Robust Parser Regex function
        function extractMultiline(block, tag, defaultVal) {
            const regex = new RegExp(`\\[${tag}\\]:?\\s*([\\s\\S]*?)(?=\\n\\s*\\[[a-zA-Z]+\\]|$)`, 'i');
            const match = block.match(regex);
            return match && match[1].trim() !== '' ? match[1].trim() : defaultVal;
        }

        function processMCQs() {
            const raw = document.getElementById('raw-mcq-input').value;
            const mcqBlocks = raw.split(/\n\s*\n/).filter(b => b.trim() !== '');
            state.stagedQuestions = [];
            
            // Check for duplicates globally across already saved session AND current batch
            const currentSessionStems = new Set(state.session.map(q => q.question.toLowerCase().trim()));
            const stagedStems = new Set();
            let duplicateCount = 0;

            mcqBlocks.forEach(block => {
                const stem = extractMultiline(block, 'Q', '');
                if(!stem) return;

                const normalizedStem = stem.toLowerCase().trim();

                // Advanced Redundancy Check
                if (currentSessionStems.has(normalizedStem) || stagedStems.has(normalizedStem)) {
                    duplicateCount++;
                    return;
                }
                stagedStems.add(normalizedStem);

                let rawAns = extractMultiline(block, 'ANS', 'A').toUpperCase();
                let cleanAns = rawAns.match(/[A-E]/) ? rawAns.match(/[A-E]/)[0] : 'A';

                const q = {
                    id: crypto.randomUUID().split('-')[0].toUpperCase(),
                    lo: extractMultiline(block, 'LO', 'Unspecified'),
                    source: extractMultiline(block, 'SRC', 'Unknown'),
                    difficulty: extractMultiline(block, 'DIFF', 'Medium'),
                    question: stem,
                    ans: cleanAns,
                    explanation: extractMultiline(block, 'EXP', ''),
                    options: {
                        A: extractMultiline(block, 'A', 'Option A'),
                        B: extractMultiline(block, 'B', 'Option B'),
                        C: extractMultiline(block, 'C', 'Option C'),
                        D: extractMultiline(block, 'D', 'Option D'),
                        E: extractMultiline(block, 'E', 'Option E')
                    }
                };
                state.stagedQuestions.push(q);
            });

            if(duplicateCount > 0) {
                const status = document.getElementById('parse-status');
                status.textContent = `${duplicateCount} Duplicates Cleaned`;
                status.classList.remove('hidden');
                setTimeout(() => status.classList.add('hidden'), 5000);
            }

            renderPreview();
        }

        function renderPreview() {
            const container = document.getElementById('parsed-preview-container');
            container.innerHTML = '';
            container.classList.remove('hidden');
            document.getElementById('stage-btn-container').classList.remove('hidden');

            state.stagedQuestions.forEach((q, idx) => {
                const div = document.createElement('div');
                div.className = "p-4 border border-slate-200 rounded-xl bg-slate-50 text-xs space-y-2 animate-fade-in";
                div.innerHTML = `
                    <div class="flex justify-between font-bold text-indigo-600">
                        <span>#${idx+1} | LO: ${q.lo}</span>
                        <span class="${q.difficulty === 'Hard' ? 'text-red-500' : 'text-green-600'}">${q.difficulty}</span>
                    </div>
                    <p class="font-bold">${q.question}</p>
                `;
                container.appendChild(div);
            });
        }

        function saveToSession() {
            const year = document.getElementById('input-year').value;
            const block = `Block ${document.getElementById('input-block').value}`;
            const module = document.getElementById('input-custom-module').value || document.getElementById('input-module-select').value;
            const subject = document.getElementById('input-custom-subject').value || document.getElementById('input-subject').value;

            if(document.getElementById('input-custom-module').value) {
                const bNum = document.getElementById('input-block').value;
                if(!state.customModules[bNum]) state.customModules[bNum] = [];
                state.customModules[bNum].push(module);
            }
            if(document.getElementById('input-custom-subject').value) {
                state.customSubjects.push(subject);
            }

            const formatted = state.stagedQuestions.map(q => ({
                ...q,
                meta: { year, block, module, subject }
            }));

            state.session = [...state.session, ...formatted];
            persist();
            
            state.stagedQuestions = [];
            document.getElementById('raw-mcq-input').value = '';
            document.getElementById('parsed-preview-container').classList.add('hidden');
            document.getElementById('stage-btn-container').classList.add('hidden');
            updateLiveStats();
            renderSession();
            renderModules();
            renderSubjects();
        }

        function renderSession() {
            const list = document.getElementById('session-list');
            const section = document.getElementById('review-section');
            const count = document.getElementById('entry-count');
            
            count.textContent = `${state.session.length} Staged`;
            if(state.session.length === 0) {
                section.classList.add('hidden');
                return;
            }
            section.classList.remove('hidden');

            const fMod = document.getElementById('filter-module');
            const fSub = document.getElementById('filter-subject');
            const curMod = fMod.value;
            const curSub = fSub.value;
            
            const mods = [...new Set(state.session.map(q => q.meta.module))];
            const subs = [...new Set(state.session.map(q => q.meta.subject))];
            
            fMod.innerHTML = '<option value="">All Modules</option>';
            fSub.innerHTML = '<option value="">All Subjects</option>';
            mods.forEach(m => fMod.add(new Option(m,m)));
            subs.forEach(s => fSub.add(new Option(s,s)));
            fMod.value = curMod; fSub.value = curSub;

            const filtered = state.session.filter(q => {
                return (!fMod.value || q.meta.module === fMod.value) &&
                       (!fSub.value || q.meta.subject === fSub.value) &&
                       (!document.getElementById('filter-diff').value || q.difficulty === document.getElementById('filter-diff').value);
            });

            list.innerHTML = '';
            filtered.forEach((q) => {
                const div = document.createElement('div');
                div.className = "bg-slate-800 border border-slate-700 rounded-2xl p-6 space-y-4 relative group animate-fade-in";
                
                // Visible Edit & Delete Buttons updated
                div.innerHTML = `
                    <div class="absolute top-4 right-4 flex gap-2 z-10 opacity-100 transition-opacity">
                        <button onclick="openEditModal('${q.id}')" class="p-2 bg-indigo-500/20 text-indigo-400 hover:bg-indigo-500 hover:text-white rounded-lg transition-colors shadow-sm cursor-pointer" title="Edit Question"><i data-lucide="edit-3" class="w-4 h-4 pointer-events-none"></i></button>
                        <button onclick="removeQuestion('${q.id}')" class="p-2 bg-red-500/20 text-red-400 hover:bg-red-500 hover:text-white rounded-lg transition-colors shadow-sm cursor-pointer" title="Delete Question"><i data-lucide="trash-2" class="w-4 h-4 pointer-events-none"></i></button>
                    </div>
                    <div class="flex flex-wrap gap-2 pr-20">
                        <span class="text-[9px] bg-indigo-500 text-white px-2 py-0.5 rounded font-black uppercase">${q.meta.module}</span>
                        <span class="text-[9px] bg-slate-700 text-slate-300 px-2 py-0.5 rounded uppercase">${q.meta.subject}</span>
                        <span class="text-[9px] border border-slate-600 text-slate-400 px-2 py-0.5 rounded uppercase">ID: ${q.id}</span>
                    </div>
                    <div class="space-y-4">
                        <p class="text-sm font-bold text-slate-100">${q.question}</p>
                        <div class="grid grid-cols-1 gap-2 text-xs text-slate-400">
                            <div class="p-2 rounded-lg ${q.ans === 'A' ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 'bg-slate-900/50 border border-slate-700/50'}">A) ${q.options.A}</div>
                            <div class="p-2 rounded-lg ${q.ans === 'B' ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 'bg-slate-900/50 border border-slate-700/50'}">B) ${q.options.B}</div>
                            <div class="p-2 rounded-lg ${q.ans === 'C' ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 'bg-slate-900/50 border border-slate-700/50'}">C) ${q.options.C}</div>
                            <div class="p-2 rounded-lg ${q.ans === 'D' ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 'bg-slate-900/50 border border-slate-700/50'}">D) ${q.options.D}</div>
                            <div class="p-2 rounded-lg ${q.ans === 'E' ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 'bg-slate-900/50 border border-slate-700/50'}">E) ${q.options.E}</div>
                        </div>
                    </div>
                    <div class="pt-3 border-t border-slate-700 space-y-2">
                        <p class="text-[10px] text-slate-500 italic">LO: ${q.lo} | Source: ${q.source}</p>
                        ${q.explanation ? `<div class="bg-indigo-500/5 p-3 rounded-lg text-[10px] text-indigo-300/80 leading-relaxed border border-indigo-500/10"><strong>Exp:</strong> ${q.explanation}</div>` : ''}
                    </div>
                `;
                list.appendChild(div);
            });
            lucide.createIcons();
        }

        // EDIT LOGIC
        function openEditModal(id) {
            const q = state.session.find(x => x.id === id);
            if(!q) return;
            state.editingQuestionId = id;
            document.getElementById('edit-q').value = q.question;
            document.getElementById('edit-a').value = q.options.A;
            document.getElementById('edit-b').value = q.options.B;
            document.getElementById('edit-c').value = q.options.C;
            document.getElementById('edit-d').value = q.options.D;
            document.getElementById('edit-e').value = q.options.E;
            document.getElementById('edit-ans').value = q.ans;
            document.getElementById('edit-exp').value = q.explanation;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.add('hidden');
            state.editingQuestionId = null;
        }

        function commitEdit() {
            const id = state.editingQuestionId;
            const idx = state.session.findIndex(x => x.id === id);
            if(idx === -1) return;

            state.session[idx].question = document.getElementById('edit-q').value;
            state.session[idx].options.A = document.getElementById('edit-a').value;
            state.session[idx].options.B = document.getElementById('edit-b').value;
            state.session[idx].options.C = document.getElementById('edit-c').value;
            state.session[idx].options.D = document.getElementById('edit-d').value;
            state.session[idx].options.E = document.getElementById('edit-e').value;
            state.session[idx].ans = document.getElementById('edit-ans').value;
            state.session[idx].explanation = document.getElementById('edit-exp').value;

            persist();
            renderSession();
            closeEditModal();
        }

        function removeQuestion(id) {
            state.session = state.session.filter(q => q.id !== id);
            persist();
            renderSession();
        }

        function resetSession() {
            if(confirm("Wipe current bank?")) {
                state.session = [];
                persist();
                renderSession();
            }
        }

        function persist() {
            localStorage.setItem('mcq_session', JSON.stringify(state.session));
            localStorage.setItem('mcq_custom_mods', JSON.stringify(state.customModules));
            localStorage.setItem('mcq_custom_subs', JSON.stringify(state.customSubjects));
            localStorage.setItem('mcq_history', JSON.stringify(state.history));
        }

        function copyMasterJSON() {
            const blob = { 
                bankMetadata: { count: state.session.length, generated: new Date().toISOString() },
                questions: state.session 
            };
            const json = JSON.stringify(blob, null, 2);
            navigator.clipboard.writeText(json).then(() => alert("Master JSON copied to clipboard!"));
        }

        function importJSON() {
            try {
                const raw = document.getElementById('import-area').value;
                const data = JSON.parse(raw);
                const imported = data.questions || (Array.isArray(data) ? data : []);
                state.session = [...state.session, ...imported];
                persist();
                renderSession();
                alert("Import successful!");
            } catch(e) { alert("Invalid JSON."); }
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            state.history.forEach((h, idx) => {
                const div = document.createElement('div');
                div.className = "p-5 bg-white border border-slate-200 rounded-3xl space-y-3 hover:border-indigo-300 transition-all";
                div.innerHTML = `
                    <h4 class="font-black text-sm text-slate-800">${h.name}</h4>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${h.date}</p>
                    <div class="flex justify-between items-center pt-2">
                        <span class="text-xs font-black text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">${h.count} Questions</span>
                        <div class="flex gap-2">
                            <button onclick="loadHistory(${idx})" class="p-2 bg-indigo-50 text-indigo-600 rounded-xl hover:bg-indigo-100 transition-colors"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
                            <button onclick="deleteHistory(${idx})" class="p-2 bg-red-50 text-red-600 rounded-xl hover:bg-red-100 transition-colors"><i data-lucide="trash" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
            lucide.createIcons();
        }

        function saveCurrentToHistory() {
            if(state.session.length === 0) return;
            const name = prompt("Session Name?", `MCQ Bank ${new Date().toLocaleDateString()}`);
            if(!name) return;
            state.history.unshift({ name, date: new Date().toLocaleString(), count: state.session.length, data: state.session });
            persist();
            renderHistory();
        }

        function loadHistory(idx) {
            state.session = state.history[idx].data;
            persist();
            renderSession();
            switchTab('builder');
        }

        function deleteHistory(idx) {
            state.history.splice(idx, 1);
            persist();
            renderHistory();
        }

        window.onload = init;
    </script>
</body>
</html>
