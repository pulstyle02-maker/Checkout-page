<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Out of Stock</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 50px 40px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      backdrop-filter: blur(12px);
      max-width: 650px;
      width: 90%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      animation: fadeIn 1s ease;
    }

    .badge {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      color: #f8fafc;
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 25px;
    }

    h1 {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #ffffff;
    }

    p {
      font-size: 18px;
      line-height: 1.7;
      color: #cbd5e1;
    }

    .highlight {
      color: #38bdf8;
      font-weight: 600;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 34px;
      }

      p {
        font-size: 16px;
      }

      .container {
        padding: 40px 25px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="badge">Temporary Notice</div>

    <h1>We're Currently Out of Stock</h1>

    <p>
      Our products are temporarily unavailable at the moment.
      We are working hard to restock everything and will be back
      within <span class="highlight">a few weeks</span>.
    </p>
  </div>
</body>
</html>
