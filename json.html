<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Quiz Editor & Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 1);
        }
        pre { scrollbar-width: thin; scrollbar-color: #475569 transparent; }
        textarea::placeholder { color: #94a3b8; }
        .edit-card:hover .delete-btn { opacity: 1; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <div class="w-full max-w-[1600px] space-y-6">
        <!-- Header -->
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Medical Quiz JSON Engine <span class="text-blue-500 text-lg">Pro</span></h1>
            <p class="text-slate-500 max-w-2xl mx-auto text-sm">Structured for Langman's Embryology & Genetics. Supports Source tagging and Correct Index mapping.</p>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
            
            <!-- Column 1: Input & Import -->
            <div class="glass-panel p-6 rounded-3xl shadow-xl flex flex-col space-y-4">
                <div class="flex items-center justify-between">
                    <label class="font-bold text-slate-700 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                        Add New Content
                    </label>
                </div>
                
                <div class="space-y-2">
                    <p class="text-xs font-bold text-slate-400 uppercase">Step 1: Import Existing JSON</p>
                    <textarea 
                        id="jsonImportInput" 
                        placeholder='Paste previous JSON here...'
                        class="w-full h-32 p-3 rounded-xl border border-dashed border-slate-300 bg-slate-50 text-xs font-mono focus:ring-2 focus:ring-blue-400 outline-none"
                    ></textarea>
                    <button onclick="importJSON()" class="w-full py-2 bg-slate-800 text-white rounded-xl text-xs font-bold hover:bg-slate-700 transition-all">Merge Existing JSON</button>
                </div>

                <div class="space-y-2 flex-grow">
                    <p class="text-xs font-bold text-slate-400 uppercase">Step 2: Append Raw Text</p>
                    <textarea 
                        id="textInput" 
                        placeholder="[LO]: F-A-037&#10;[SRC]: LANGMANN&#10;[Q]: Question...&#10;[A]: Option A&#10;[B]: Option B&#10;[ANS]: B&#10;[EXP]: Explanation...&#10;---"
                        class="w-full h-80 p-4 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-400 outline-none resize-none bg-white text-slate-800 font-mono text-sm shadow-inner"
                    ></textarea>
                    <button onclick="parseAndAppend()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">Convert & Append</button>
                </div>
            </div>

            <!-- Column 2: Live Editor -->
            <div class="glass-panel p-6 rounded-3xl shadow-xl flex flex-col space-y-4 overflow-hidden">
                <div class="flex items-center justify-between">
                    <label class="font-bold text-slate-700 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                        Manage & Edit
                    </label>
                    <button onclick="clearAll()" class="text-[10px] font-black text-red-400 hover:text-red-600 uppercase tracking-tighter">Reset All</button>
                </div>

                <div id="editorList" class="flex-grow overflow-y-auto space-y-4 pr-2 custom-scrollbar max-h-[700px]">
                    <div class="text-center py-20 text-slate-300 italic text-sm">No items yet.</div>
                </div>
            </div>

            <!-- Column 3: Final Output -->
            <div class="glass-panel p-6 rounded-3xl shadow-xl flex flex-col space-y-4">
                <div class="flex items-center justify-between">
                    <label class="font-bold text-slate-700 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                        Final JSON
                    </label>
                    <div class="flex gap-2">
                        <button onclick="downloadJSON()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg text-xs font-bold transition-all">Download</button>
                        <button id="copyBtn" onclick="copyToClipboard()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-1.5 rounded-lg text-xs font-bold flex items-center gap-2 transition-all active:scale-95">Copy</button>
                    </div>
                </div>
                <div class="relative flex-grow rounded-2xl border border-slate-800 bg-slate-900 shadow-2xl overflow-hidden">
                    <pre id="jsonOutput" class="h-full p-6 text-emerald-400 font-mono text-[10px] overflow-auto whitespace-pre-wrap">[]</pre>
                </div>
                <div class="flex justify-between items-center px-2">
                    <span id="itemCount" class="text-xs font-bold text-slate-400 bg-slate-100 px-3 py-1 rounded-full uppercase">0 Questions</span>
                    <div id="statusMessage" class="text-xs font-bold text-emerald-600 opacity-0 transition-all">Ready</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let masterData = [];

        const textInput = document.getElementById('textInput');
        const jsonImportInput = document.getElementById('jsonImportInput');
        const jsonOutput = document.getElementById('jsonOutput');
        const editorList = document.getElementById('editorList');
        const itemCount = document.getElementById('itemCount');
        const statusMessage = document.getElementById('statusMessage');

        function importJSON() {
            try {
                const imported = JSON.parse(jsonImportInput.value);
                if (Array.isArray(imported)) {
                    masterData = [...masterData, ...imported];
                    jsonImportInput.value = '';
                    updateUI();
                    notifyUser("JSON Merged!");
                }
            } catch (e) {
                alert("Invalid JSON format.");
            }
        }

        function parseAndAppend() {
            const raw = textInput.value;
            if (!raw.trim()) return;
            const newItems = parseBlocks(raw);
            masterData = [...masterData, ...newItems];
            textInput.value = '';
            updateUI();
            notifyUser("Text Appended!");
        }

        function parseBlocks(text) {
            const blocks = text.split(/(?=^\[LO\]:)/m).filter(b => b.trim().length > 0);
            return blocks.map(block => {
                const extract = (tag) => {
                    const regex = new RegExp(`\\[${tag}\\]:\\s*([\\s\\S]*?)(?=\\n\\[|\\n---+|$)`, 'i');
                    const match = block.match(regex);
                    return match ? match[1].trim() : null;
                };

                const options = [];
                const optionLetters = ['A', 'B', 'C', 'D', 'E'];
                optionLetters.forEach(letter => {
                    const opt = extract(letter);
                    if (opt) options.push(opt);
                });

                const rawAns = extract('ANS');
                let correctIndex = -1;
                if (rawAns) {
                    const letter = rawAns.trim().toUpperCase().charAt(0);
                    correctIndex = optionLetters.indexOf(letter);
                }

                const question = extract('Q');
                const explanation = extract('EXP');
                let difficulty = "Easy";
                const totalLength = (question?.length || 0) + (explanation?.length || 0);
                if (totalLength > 450) difficulty = "Hard";
                else if (totalLength > 250) difficulty = "Moderate";

                return {
                    lo: extract('LO')?.replace(/\.$/, '') || "",
                    source: extract('SRC') || "LANGMANN",
                    question: question || "",
                    options: options,
                    correctIndex: correctIndex,
                    explanation: explanation || "",
                    difficulty: difficulty
                };
            }).filter(i => i.question || i.lo);
        }

        function updateUI() {
            renderEditor();
            jsonOutput.textContent = JSON.stringify(masterData, null, 2);
            itemCount.textContent = `${masterData.length} Questions`;
        }

        function renderEditor() {
            if (masterData.length === 0) {
                editorList.innerHTML = `<div class="text-center py-20 text-slate-300 italic text-sm">No items yet.</div>`;
                return;
            }

            editorList.innerHTML = masterData.map((item, idx) => `
                <div class="edit-card bg-white border border-slate-200 p-4 rounded-xl shadow-sm relative group transition-all hover:border-blue-300">
                    <button onclick="removeItem(${idx})" class="delete-btn absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center opacity-0 transition-opacity shadow-lg hover:bg-red-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
                    </button>
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <div class="flex flex-col">
                            <span class="text-[8px] font-bold text-slate-400 uppercase">LO Code</span>
                            <input oninput="updateItem(${idx}, 'lo', this.value)" value="${item.lo}" class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded border-none focus:ring-1 focus:ring-blue-300 outline-none">
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[8px] font-bold text-slate-400 uppercase">Source</span>
                            <input oninput="updateItem(${idx}, 'source', this.value)" value="${item.source}" class="text-[10px] font-bold text-purple-600 bg-purple-50 px-2 py-0.5 rounded border-none focus:ring-1 focus:ring-purple-300 outline-none">
                        </div>
                    </div>
                    <div class="mb-2">
                         <span class="text-[8px] font-bold text-slate-400 uppercase">Question Body</span>
                         <textarea oninput="updateItem(${idx}, 'question', this.value)" class="w-full text-xs font-semibold text-slate-800 border-none bg-transparent focus:ring-0 resize-none p-0 leading-tight" rows="3">${item.question}</textarea>
                    </div>
                    <div class="space-y-1 pl-2 border-l-2 border-slate-100 mb-2">
                        ${item.options.map((opt, oIdx) => `
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] font-bold ${item.correctIndex === oIdx ? 'text-emerald-500' : 'text-slate-400'}">${String.fromCharCode(65 + oIdx)}</span>
                                <input oninput="updateOption(${idx}, ${oIdx}, this.value)" value="${opt}" class="text-[10px] text-slate-600 w-full border-none bg-transparent focus:ring-0 p-0">
                            </div>
                        `).join('')}
                    </div>
                    <div class="flex justify-between items-center mt-2 border-t border-slate-50 pt-2">
                        <div class="flex items-center gap-2">
                             <span class="text-[8px] font-bold text-slate-400 uppercase">Ans Index</span>
                             <input type="number" oninput="updateItem(${idx}, 'correctIndex', parseInt(this.value))" value="${item.correctIndex}" class="w-8 text-[10px] bg-slate-50 rounded border-none text-center">
                        </div>
                        <select onchange="updateItem(${idx}, 'difficulty', this.value)" class="text-[10px] bg-slate-100 rounded border-none outline-none px-2 py-0.5">
                            <option ${item.difficulty === 'Easy' ? 'selected' : ''}>Easy</option>
                            <option ${item.difficulty === 'Moderate' ? 'selected' : ''}>Moderate</option>
                            <option ${item.difficulty === 'Hard' ? 'selected' : ''}>Hard</option>
                        </select>
                    </div>
                </div>
            `).join('');
        }

        function updateItem(idx, field, val) {
            masterData[idx][field] = val;
            jsonOutput.textContent = JSON.stringify(masterData, null, 2);
        }

        function updateOption(qIdx, oIdx, val) {
            masterData[qIdx].options[oIdx] = val;
            jsonOutput.textContent = JSON.stringify(masterData, null, 2);
        }

        function removeItem(idx) {
            masterData.splice(idx, 1);
            updateUI();
        }

        function copyToClipboard() {
            const textToCopy = jsonOutput.textContent;
            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            notifyUser("Copied!");
        }

        function downloadJSON() {
            const blob = new Blob([jsonOutput.textContent], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `quiz_export_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function notifyUser(msg) {
            statusMessage.textContent = msg;
            statusMessage.style.opacity = '1';
            setTimeout(() => statusMessage.style.opacity = '0', 2000);
        }

        function clearAll() {
            if(confirm("Clear everything?")) {
                masterData = [];
                updateUI();
            }
        }
    </script>
</body>
</html>
