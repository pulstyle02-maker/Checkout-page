<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GUESS OR MESS Histology</title>
    <style>
        :root {
            /* Premium Deep Color Palette */
            --primary: #6a11cb;
            --secondary: #2575fc;
            --accent-glow: rgba(37, 117, 252, 0.4);
            --dark-bg: #09090e;
            --card-glass: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #9ba1a6;
            --danger: #ff3b30;
            --success: #34c759;
            --font-stack: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-stack);
            background: #000000;
            color: var(--text-main);
            height: 100dvh; 
            width: 100vw;
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-user-select: none;
            user-select: none;
        }

        /* --- Mobile Wrapper --- */
        #mobile-wrapper {
            width: 100%;
            max-width: 430px; /* Mobile App Ratio Constraint */
            height: 100%;
            max-height: 932px;
            background: radial-gradient(circle at 15% 50%, #161233, transparent 50%),
                        radial-gradient(circle at 85% 30%, #0d1b2a, transparent 50%),
                        #050508;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        @media (min-width: 450px) {
            #mobile-wrapper {
                height: 90vh;
                border-radius: 40px;
                border: 8px solid #1a1a24;
            }
        }

        /* --- Elegant Header --- */
        header {
            text-align: center;
            padding: calc(15px + env(safe-area-inset-top)) 20px 15px 20px;
            background: rgba(5, 5, 8, 0.5);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            flex-shrink: 0; 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin: 0;
            font-size: 1.4rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff 0%, #a8c0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 6px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* --- Main Container --- */
        #app-container {
            flex-grow: 1;
            position: relative;
            width: 100%;
            overflow-y: auto; 
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch; 
            padding: 24px;
            padding-bottom: calc(90px + env(safe-area-inset-bottom)); 
        }

        #app-container::-webkit-scrollbar { width: 4px; }
        #app-container::-webkit-scrollbar-track { background: transparent; }
        #app-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        /* --- Views --- */
        .view {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            min-height: 100%; 
            animation: elegantFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .view.active {
            display: flex;
        }

        @keyframes elegantFadeIn {
            from { opacity: 0; transform: translateY(15px) scale(0.99); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        /* --- Toast Notification --- */
        #toast {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(20, 20, 30, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            white-space: nowrap;
        }
        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* --- Home View --- */
        .microscope-container {
            width: 130px;
            height: 130px;
            margin: 20px auto 30px auto;
            position: relative;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .microscope-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 15px rgba(168, 192, 255, 0.3));
        }

        /* Block Selector */
        .block-selector {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 320px;
            margin-bottom: 25px;
        }

        .block-btn {
            flex: 1;
            background: var(--card-glass);
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            padding: 12px 0;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .block-btn.active {
            background: rgba(106, 17, 203, 0.2);
            border-color: #a8c0ff;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(106, 17, 203, 0.4);
        }

        /* Premium Buttons */
        .menu-btn {
            background: linear-gradient(135deg, rgba(106, 17, 203, 0.8) 0%, rgba(37, 117, 252, 0.8) 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            width: 100%;
            max-width: 320px;
            padding: 18px 24px;
            margin: 8px 0;
            border-radius: 20px;
            color: #fff;
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: 1px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            touch-action: manipulation;
            position: relative;
            overflow: hidden;
        }

        .menu-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-20deg);
        }

        .menu-btn:active {
            transform: scale(0.95);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
        }

        /* Mistakes Button Specific Styling */
        .menu-btn.mistakes-btn {
            background: linear-gradient(135deg, rgba(255, 59, 48, 0.8) 0%, rgba(255, 149, 0, 0.8) 100%);
            box-shadow: 0 12px 30px rgba(255, 59, 48, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        /* --- Credits Section --- */
        .credits-container {
            margin-top: 30px;
            width: 100%;
            max-width: 320px;
            text-align: center;
        }

        .credits-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.9rem;
            padding: 10px 24px;
            border-radius: 30px;
            display: inline-block;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .credits-btn:active {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(0.96);
        }

        #credits-list {
            margin-top: 15px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #d1d1d6;
            font-size: 0.95rem;
            line-height: 1.8;
            text-align: left;
            display: none; 
            animation: elegantFadeIn 0.4s ease;
            box-shadow: inset 0 2px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
        }

        /* --- Action Header (Progress + Randomize) --- */
        .action-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }

        .action-header h2 {
            margin: 0;
            font-size: 1.15rem;
            color: #a8c0ff;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .randomize-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 8px 14px;
            border-radius: 16px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .randomize-btn:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.15);
        }

        /* --- Quiz View --- */
        .quiz-img-box {
            width: 100%;
            max-width: 400px;
            height: 240px; 
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            flex-shrink: 0;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .quiz-img-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: opacity 0.3s ease;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: var(--card-glass);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: var(--text-main);
            padding: 14px 10px;
            border-radius: 18px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            touch-action: manipulation;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 70px;
        }

        .option-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.08);
        }

        .option-btn.correct { 
            background: rgba(52, 199, 89, 0.2); 
            border-color: var(--success); 
            color: var(--success);
            box-shadow: 0 0 20px rgba(52, 199, 89, 0.2);
        }
        .option-btn.wrong { 
            background: rgba(255, 59, 48, 0.2); 
            border-color: var(--danger); 
            color: var(--danger);
            box-shadow: 0 0 20px rgba(255, 59, 48, 0.2);
        }

        /* --- OSPE View (Flashcard) --- */
        .ospe-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 40px; 
        }

        .flashcard-container {
            perspective: 1500px;
            width: 100%;
            max-width: 360px;
            height: 420px;
            margin: 10px auto;
            cursor: pointer;
            position: relative;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            transform-style: preserve-3d;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 28px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .card-front img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #020202;
        }

        .card-front .tap-hint {
            position: absolute;
            bottom: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #fff;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .card-back {
            transform: rotateY(180deg);
            padding: 25px;
            background: linear-gradient(160deg, #1c1c2e, #0f0f1a);
        }

        .card-back-scroll {
            width: 100%;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding-bottom: 20px;
        }
        
        .card-back-scroll::-webkit-scrollbar { display: none; }

        .card-back h3 {
            color: #a8c0ff;
            font-size: 1.4rem;
            margin: 0 0 20px 0;
            flex-shrink: 0;
            font-weight: 700;
        }

        .card-back ul {
            text-align: left;
            padding-left: 20px;
            line-height: 1.7;
            margin: 0;
            font-size: 1rem;
            color: #e5e5ea;
        }

        .card-back ul li {
            margin-bottom: 10px;
        }

        /* Flag button on Card Back */
        .flag-btn {
            width: 100%;
            padding: 14px 20px;
            border-radius: 20px;
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid rgba(255, 59, 48, 0.3);
            color: #ff453a;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            flex-shrink: 0;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            margin-top: 10px;
        }
        .flag-btn:active {
            transform: scale(0.96);
        }
        .flag-btn.flagged {
            background: rgba(255, 59, 48, 0.8);
            border-color: rgba(255, 59, 48, 1);
            color: white;
            box-shadow: 0 8px 20px rgba(255, 59, 48, 0.3);
        }

        .instruction {
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* --- Revision View --- */
        .revision-list {
            width: 100%;
            max-width: 500px;
        }

        .revision-item {
            background: var(--card-glass);
            margin-bottom: 24px;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            -webkit-user-select: text; 
            user-select: text;
        }

        .revision-header {
            padding: 20px 24px;
            background: rgba(255, 255, 255, 0.03);
            font-weight: 700;
            color: #a8c0ff;
            font-size: 1.25rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .revision-content {
            padding: 24px;
        }

        .revision-content ul {
            padding-left: 20px;
            margin: 0 0 24px 0;
            color: #d1d1d6;
            line-height: 1.7;
            font-size: 1rem;
        }

        .gallery {
            display: flex;
            overflow-x: auto;
            gap: 16px;
            padding-bottom: 12px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            scroll-snap-type: x mandatory;
        }
        
        .gallery::-webkit-scrollbar {
            display: none;
        }

        .gallery img {
            height: 120px;
            width: auto;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            scroll-snap-align: start;
        }

        /* --- Custom Navigation --- */
        .nav-bar {
            position: absolute;
            top: calc(15px + env(safe-area-inset-top));
            left: 15px;
            z-index: 200;
        }

        .home-btn-icon {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }

        .home-btn-icon:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.15);
        }

        /* --- Result Screen --- */
        .result-box {
            text-align: center;
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 40px 30px;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .result-box h2 {
            font-size: 1.8rem;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .wrong-list {
            text-align: left;
            margin-top: 20px;
            max-height: 220px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .wrong-item {
            padding: 14px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #ff453a;
            font-weight: 500;
            font-size: 0.95rem;
        }
        .wrong-item:last-child {
            border-bottom: none;
        }

    </style>
</head>
<body>

    <div id="mobile-wrapper">
        <header>
            <h1>GUESS OR MESS</h1>
            <div class="subtitle">Histology by ModMedicalis</div>
        </header>

        <div class="nav-bar" id="nav-bar" style="display: none;">
            <button class="home-btn-icon" onclick="goHome()">
                <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </button>
        </div>

        <div id="app-container">
            
            <!-- HOME PAGE -->
            <div id="home-view" class="view active">
                <div class="microscope-container">
                    <svg class="microscope-svg" viewBox="0 0 24 24" fill="none" stroke="url(#micro-grad)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                        <defs>
                            <linearGradient id="micro-grad" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#ffffff"/>
                                <stop offset="1" stop-color="#a8c0ff"/>
                            </linearGradient>
                        </defs>
                        <path d="M6 18h8" />
                        <path d="M3 22h18" />
                        <path d="M14 22a7 7 0 1 0 0-14h-1" />
                        <path d="M9 14h2" />
                        <path d="M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2Z" />
                        <path d="M12 6V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3" />
                    </svg>
                </div>

                <!-- Block Selection -->
                <div class="block-selector">
                    <button class="block-btn active" id="btn-block-1" onclick="selectBlock(1)">Block 1</button>
                    <button class="block-btn" id="btn-block-2" onclick="selectBlock(2)">Block 2</button>
                    <button class="block-btn" id="btn-block-3" onclick="selectBlock(3)">Block 3</button>
                </div>

                <button class="menu-btn" onclick="startQuiz()">QUIZ</button>
                <button class="menu-btn" onclick="startOspe('ALL')">OSPE</button>
                <button class="menu-btn mistakes-btn" id="home-mistakes-btn" onclick="startOspe('MISTAKES')">REVIEW MISTAKES</button>
                <button class="menu-btn" onclick="startRevision()">REVISION</button>

                <!-- Credits Section -->
                <div class="credits-container">
                    <div class="credits-btn" onclick="toggleCredits()">Credits</div>
                    <div id="credits-list">
                        1) Mahnoor Malik<br>
                        2) Muhammad Mudasir<br>
                        3) Ayesha Saddiqa<br>
                        4) Imad
                    </div>
                </div>
            </div>

            <!-- QUIZ PAGE -->
            <div id="quiz-view" class="view">
                <div class="action-header">
                    <h2 id="quiz-progress">Question 1</h2>
                    <button class="randomize-btn" onclick="randomizeQuiz()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="16 3 21 3 21 8"></polyline>
                            <line x1="4" y1="20" x2="21" y2="3"></line>
                            <polyline points="21 16 21 21 16 21"></polyline>
                            <line x1="15" y1="15" x2="21" y2="21"></line>
                            <line x1="4" y1="4" x2="9" y2="9"></line>
                        </svg> Randomize
                    </button>
                </div>
                <div class="quiz-img-box">
                    <img id="quiz-img" src="" alt="Histology Slide">
                </div>
                <div class="options-grid" id="quiz-options">
                    <!-- Options generated by JS -->
                </div>
            </div>

            <!-- OSPE PAGE -->
            <div id="ospe-view" class="view">
                <div class="action-header">
                    <h2 id="ospe-progress" style="color:transparent;user-select:none;">-</h2>
                    <button class="randomize-btn" onclick="randomizeOspe()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="16 3 21 3 21 8"></polyline>
                            <line x1="4" y1="20" x2="21" y2="3"></line>
                            <polyline points="21 16 21 21 16 21"></polyline>
                            <line x1="15" y1="15" x2="21" y2="21"></line>
                            <line x1="4" y1="4" x2="9" y2="9"></line>
                        </svg> Randomize
                    </button>
                </div>
                <div class="ospe-wrapper">
                    <div class="flashcard-container" onclick="flipCard()">
                        <div class="flashcard" id="ospe-card">
                            <div class="card-front">
                                <img id="ospe-img" src="" alt="OSPE Slide">
                                <div class="tap-hint">Tap to Reveal</div>
                            </div>
                            <div class="card-back">
                                <div class="card-back-scroll">
                                    <h3 id="ospe-title">Title</h3>
                                    <ul id="ospe-points">
                                        <!-- Points -->
                                    </ul>
                                </div>
                                <button id="ospe-flag-btn" onclick="toggleMistake(event)" class="flag-btn">☆ Mark as Mistake</button>
                            </div>
                        </div>
                    </div>
                    <div class="instruction">Tap card to flip • Tap Next for new slide</div>
                    <button class="menu-btn" style="margin-top: 20px; width: 240px; padding: 18px;" onclick="nextOspe()">Next Slide</button>
                </div>
            </div>

            <!-- REVISION PAGE -->
            <div id="revision-view" class="view">
                <h2 style="color:#a8c0ff; margin-bottom: 25px; font-size: 1.5rem; font-weight: 700; letter-spacing: 0.5px;">Study Notes</h2>
                <div class="revision-list" id="revision-container">
                    <!-- Injected via JS -->
                </div>
            </div>

            <!-- RESULTS PAGE -->
            <div id="result-view" class="view">
                <div class="result-box">
                    <h2 style="color: white; margin-top: 0;">Quiz Complete!</h2>
                    <h1 id="final-score" style="font-size: 4rem; margin: 20px 0; background: linear-gradient(135deg, #a8c0ff, #ffffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800;">8/10</h1>
                    <p id="feedback-msg" style="font-size: 1.15rem; color: var(--success); font-weight: 600;">Great Job!</p>
                    
                    <div id="wrong-answers-container" style="display:none;">
                        <p style="color: var(--text-muted); font-weight:600; margin-top:30px; text-align: left; padding-left: 8px;">Focus on these slides:</p>
                        <div class="wrong-list" id="wrong-list"></div>
                    </div>

                    <button class="menu-btn" style="margin-top: 35px;" onclick="goHome()">Back to Home</button>
                </div>
            </div>

        </div>
        
        <!-- Toast Notification -->
        <div id="toast"></div>
    </div>

    <script>
        // --- DATA ---
        const blocksData = {

                    points:[

                        "Many serous demilunes"
                    ],
                    images:[

                },
                {
                    name: "Dense regular elastic connective tissue",
                    points:[

                },
                {

                    points:[

                        "Fibroblasts in between the fibre bundles"
                    ],
                    images:[

                    ]
                },
                {
                    name: "Loose connective tissue",
                    points:[
                        "Abundant ground substance with Connective tissue cells",
                        "Scattered / dispersed fibres (collagen fiber bundles / elastic fibers)"
                    ],
                    images:[
                        "https://i.imgur.com/jl9TwgL.jpeg",
                        "https://i.imgur.com/t19752O.jpeg"
                    ]
                },
                {
                    name: "Mucoid connective tissue",
                    points:[
                        "Abundant ground substance",
                        "Stellate fibroblasts / mesenchymal cells"
                    ],
                    images:[
                        "https://i.imgur.com/NABpNtj.jpeg"
                    ]
                },
                {
                    name: "Palatine tonsils",
                    points:[
                        "Non-keratinized stratified squamous epithelium",
                        "Tonsillar crypts",
                        "Lymph nodules"
                    ],
                    images:[
                        "https://i.imgur.com/67FTZ3z.jpeg",
                        "https://i.imgur.com/c54qTvO.jpeg"
                    ]
                }
            ],
            2: [], // Future blocks
            3:[]
        };

        // --- STATE ---
        let currentBlock = 1;
        let quizQuestions =[];
        let currentQuestionIndex = 0;
        let score = 0;
        let wrongAnswers =[];
        let ospeDeck =[];
        let currentOspeIndex = 0;
        
        // Load Mistakes from LocalStorage
        let savedMistakes = JSON.parse(localStorage.getItem('modmed_histology_mistakes')) ||[];

        // --- UI UTILS ---
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        // --- NAVIGATION & BLOCK LOGIC ---
        function selectBlock(num) {
            currentBlock = num;
            document.querySelectorAll('.block-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-block-${num}`).classList.add('active');
        }

        function getActiveData() {
            return blocksData[currentBlock];
        }

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            
            // Scroll to top when changing view
            document.getElementById('app-container').scrollTop = 0;

            const nav = document.getElementById('nav-bar');
            if (viewId === 'home-view' || viewId === 'result-view') {
                nav.style.display = 'none';
            } else {
                nav.style.display = 'block';
            }
        }

        function goHome() {
            showView('home-view');
        }

        function toggleCredits() {
            const list = document.getElementById('credits-list');
            if (list.style.display === 'none' || list.style.display === '') {
                list.style.display = 'block';
            } else {
                list.style.display = 'none';
            }
        }

        // --- QUIZ LOGIC ---
        function startQuiz() {
            const data = getActiveData();
            if (!data || data.length === 0) {
                showToast(`Block ${currentBlock} is currently empty!`);
                return;
            }

            quizQuestions = [];
            score = 0;
            wrongAnswers =[];
            currentQuestionIndex = 0;

            // Flatten images into questions
            data.forEach(cat => {
                cat.images.forEach(imgUrl => {
                    quizQuestions.push({
                        image: imgUrl,
                        answer: cat.name,
                        correctPoints: cat.points
                    });
                });
            });

            quizQuestions = shuffleArray(quizQuestions);
            loadQuestion();
            showView('quiz-view');
        }

        function randomizeQuiz() {
            quizQuestions = shuffleArray(quizQuestions);
            currentQuestionIndex = 0;
            score = 0;
            wrongAnswers =[];
            loadQuestion();
            showToast("Quiz Reshuffled");
        }

        function loadQuestion() {
            if (currentQuestionIndex >= quizQuestions.length) {
                endQuiz();
                return;
            }

            const q = quizQuestions[currentQuestionIndex];
            document.getElementById('quiz-progress').innerText = `Slide ${currentQuestionIndex + 1} of ${quizQuestions.length}`;
            
            const imgEl = document.getElementById('quiz-img');
            imgEl.style.opacity = '0';
            setTimeout(() => {
                imgEl.src = q.image;
                imgEl.onload = () => imgEl.style.opacity = '1';
            }, 150);

            const optionsDiv = document.getElementById('quiz-options');
            optionsDiv.innerHTML = '';

            const data = getActiveData();
            let allNames = data.map(d => d.name);
            let distractors = allNames.filter(n => n !== q.answer);
            distractors = shuffleArray(distractors).slice(0, 3);
            
            let options = [...distractors, q.answer];
            options = shuffleArray(options);

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, q.answer, btn);
                optionsDiv.appendChild(btn);
            });
        }

        function checkAnswer(selected, correct, btnElement) {
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => b.disabled = true);

            if (selected === correct) {
                score++;
                btnElement.classList.add('correct');
            } else {
                btnElement.classList.add('wrong');
                btns.forEach(b => {
                    if (b.innerText === correct) b.classList.add('correct');
                });
                wrongAnswers.push(quizQuestions[currentQuestionIndex]);
            }

            setTimeout(() => {
                currentQuestionIndex++;
                loadQuestion();
            }, 1200);
        }

        function endQuiz() {
            showView('result-view');
            document.getElementById('final-score').innerText = `${score}/${quizQuestions.length}`;
            
            const wrongContainer = document.getElementById('wrong-answers-container');
            const wrongList = document.getElementById('wrong-list');
            const msg = document.getElementById('feedback-msg');

            if (score === quizQuestions.length) {
                msg.innerText = "Histology Master! Perfect Score.";
                msg.style.color = "var(--success)";
                wrongContainer.style.display = 'none';
            } else {
                msg.innerText = "Good effort! Review the mistakes below.";
                msg.style.color = "#a8c0ff";
                wrongContainer.style.display = 'block';
                wrongList.innerHTML = '';
                
                const uniqueWrongs =[...new Set(wrongAnswers.map(w => w.answer))];
                
                uniqueWrongs.forEach(catName => {
                    const div = document.createElement('div');
                    div.className = 'wrong-item';
                    div.innerHTML = `<strong>${catName}</strong>`;
                    wrongList.appendChild(div);
                });
            }
        }

        // --- OSPE & MISTAKES LOGIC ---
        function startOspe(mode = 'ALL') {
            const data = getActiveData();
            if (!data || data.length === 0) {
                showToast(`Block ${currentBlock} is currently empty!`);
                return;
            }

            ospeDeck =[];
            currentOspeIndex = 0;

            data.forEach(cat => {
                cat.images.forEach(img => {
                    if (mode === 'ALL' || savedMistakes.includes(img)) {
                        ospeDeck.push({
                            image: img,
                            name: cat.name,
                            points: cat.points
                        });
                    }
                });
            });

            if (mode === 'MISTAKES' && ospeDeck.length === 0) {
                const btn = document.getElementById('home-mistakes-btn');
                const origText = btn.innerText;
                btn.innerText = "No Mistakes Here! 🎉";
                setTimeout(() => btn.innerText = origText, 2500);
                return;
            }

            ospeDeck = shuffleArray(ospeDeck);
            loadOspeCard();
            showView('ospe-view');
        }

        function randomizeOspe() {
            ospeDeck = shuffleArray(ospeDeck);
            currentOspeIndex = 0;
            loadOspeCard();
            showToast("Deck Reshuffled");
        }

        function loadOspeCard() {
            const card = document.getElementById('ospe-card');
            card.classList.remove('flipped'); 

            setTimeout(() => {
                const data = ospeDeck[currentOspeIndex];
                document.getElementById('ospe-img').src = data.image;
                document.getElementById('ospe-title').innerText = data.name;
                
                const ul = document.getElementById('ospe-points');
                ul.innerHTML = '';
                data.points.forEach(p => {
                    const li = document.createElement('li');
                    li.innerHTML = p;
                    ul.appendChild(li);
                });
                
                updateFlagButtonUI();
            }, 300);
        }

        function flipCard() {
            document.getElementById('ospe-card').classList.toggle('flipped');
        }

        function nextOspe() {
            currentOspeIndex = (currentOspeIndex + 1) % ospeDeck.length;
            loadOspeCard();
        }

        function toggleMistake(e) {
            e.stopPropagation(); 
            const currentImg = ospeDeck[currentOspeIndex].image;
            const idx = savedMistakes.indexOf(currentImg);
            
            if (idx > -1) {
                savedMistakes.splice(idx, 1);
                showToast("Removed from Mistakes");
            } else {
                savedMistakes.push(currentImg);
                showToast("Added to Mistakes");
            }
            
            localStorage.setItem('modmed_histology_mistakes', JSON.stringify(savedMistakes));
            updateFlagButtonUI();
        }

        function updateFlagButtonUI() {
            const btn = document.getElementById('ospe-flag-btn');
            const currentImg = ospeDeck[currentOspeIndex].image;
            
            if (savedMistakes.includes(currentImg)) {
                btn.classList.add('flagged');
                btn.innerHTML = '★ Remove from Mistakes';
            } else {
                btn.classList.remove('flagged');
                btn.innerHTML = '☆ Mark as Mistake';
            }
        }

        // --- REVISION LOGIC ---
        function startRevision() {
            const data = getActiveData();
            if (!data || data.length === 0) {
                showToast(`Block ${currentBlock} is currently empty!`);
                return;
            }

            const container = document.getElementById('revision-container');
            container.innerHTML = '';

            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'revision-item';

                let pointsHtml = '';
                item.points.forEach(p => pointsHtml += `<li>${p}</li>`);

                let imgsHtml = '';
                item.images.forEach(img => imgsHtml += `<img src="${img}" loading="lazy">`);

                div.innerHTML = `
                    <div class="revision-header">${item.name}</div>
                    <div class="revision-content">
                        <ul>${pointsHtml}</ul>
                        <div class="gallery">${imgsHtml}</div>
                    </div>
                `;
                container.appendChild(div);
            });

            showView('revision-view');
        }

        // --- UTILS ---
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

    </script>
