<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --ospe-paper: #ffffff;
            --ospe-bg: #f3f4f6;
            --primary: #2563eb;
            --text-main: #1f2937;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--ospe-bg);
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
        }

        .font-arial {
            font-family: Arial, Helvetica, sans-serif;
        }

        .signature {
            font-family: 'Caveat', cursive;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* Wooden Table Background for OSPE Exam */
        .wood-table-bg {
            background-color: #3e2723;
            background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
        }

        /* Realistic Physical Paper Styling */
        .ospe-sheet {
            background-color: #ffffff;
            color: #000000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 5px 15px rgba(0,0,0,0.3);
            border-radius: 2px;
            position: relative;
        }

        .flashcard-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flashcard.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }

        .backface-hidden {
            backface-visibility: hidden;
        }

        .rotate-y-180 {
            transform: rotateY(180deg);
        }

        /* Global scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* Custom scrollbar for flashcard back to fix overflow */
        .flashcard-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .flashcard-scroll::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
        }
        .flashcard-scroll::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
        }

        .mode-radio:checked + label {
            background-color: #eff6ff;
            border-color: #3b82f6;
            color: #1e3a8a;
            box-shadow: inset 0 0 0 1px #3b82f6;
        }
        
        .mode-radio:checked + label svg {
            color: #3b82f6;
        }
    </style>
</head>

                        <div class="absolute inset-0 bg-gradient-to-br from-slate-900 to-slate-800 text-white border border-slate-700 rounded-[2rem] p-6 md:p-8 flex flex-col backface-hidden rotate-y-180 shadow-2xl overflow-y-auto overflow-x-hidden flashcard-scroll">
                            <h3 class="text-xl md:text-2xl font-black text-blue-400 mb-4 border-b border-slate-700/50 pb-3 leading-tight shrink-0">${item.name}</h3>
                            <p class="text-sm text-slate-300 italic mb-5 leading-relaxed bg-white/5 p-4 rounded-xl border border-white/10 shrink-0">${item.desc}</p>
                            <div class="space-y-3.5 mt-auto flex-1">
                                ${item.points.map(p => `<div class="flex gap-3 text-sm font-medium items-start"><div class="w-1.5 h-1.5 rounded-full bg-blue-500 mt-1.5 shrink-0 shadow-[0_0_8px_rgba(59,130,246,0.8)]"></div><span class="text-slate-200">${p}</span></div>`).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function nextCard() { currentCardIndex = (currentCardIndex + 1) % activeDeck.length; renderCard(); }
        function prevCard() { currentCardIndex = (currentCardIndex - 1 + activeDeck.length) % activeDeck.length; renderCard(); }
        function shuffleDeck() { activeDeck.sort(() => Math.random() - 0.5); currentCardIndex = 0; renderCard(); }

        // OSPE LOGIC (Uses the 100 flattened stations)
        function renderStationList() {
            const list = document.getElementById('ospe-station-list');
            list.innerHTML = ospeStations.map((d, i) => `
                <div onclick="startOspe(${i})" class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-blue-200 flex justify-between items-center cursor-pointer transition-all hover:-translate-y-0.5 group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center text-sm font-bold group-hover:bg-blue-600 group-hover:text-white transition-colors">${i+1}</div>
                        <span class="font-bold text-slate-700 group-hover:text-slate-900 transition-colors">Station ${i+1}</span>
                    </div>
                    <svg class="text-slate-300 group-hover:text-blue-500 transition-colors" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
                </div>
            `).join('');
        }

        function startOspe(index) {
            currentStationIndex = index;
            showView('ospe-exam');
            startTimer();
            renderOspeStation();
        }

        function renderOspeStation() {
            const paper = document.getElementById('ospe-paper-content');
            const stationData = ospeStations[currentStationIndex];
            const scenario = stationData.scenario;

            paper.innerHTML = `
                <!-- Top Section -->
                <div class="text-center font-bold mb-4 text-black font-arial">
                    <div class="text-lg tracking-wide italic">Objectively Structured Performance Evaluation</div>
                    <div class="text-[22px] underline mt-1 decoration-2 underline-offset-2">Observed Station ${currentStationIndex + 1}</div>
                </div>
                
                <div class="flex justify-between font-bold text-sm text-black font-arial">
                    <div>Marks: 08</div>
                    <div>Time Allowed: ${isTimedMode ? '06' : '00'}</div>
                </div>
                <div class="font-bold text-sm mb-4 text-black font-arial">minutes</div>

                <div class="text-sm text-black font-arial">
                    <div class="font-bold underline text-lg">For Organizer:</div>
                    <div class="font-bold mt-1">Requirements:</div>
                    <div class="flex gap-1 md:gap-8 text-sm mb-2 mt-1 flex-wrap">
                        <span>1. Response Sheet</span>
                        <span>2.Pen/ball point</span>
                        <span>3.Table</span>
                        <span>4.Chair /Stool</span>
                    </div>
                    <div class="font-bold text-base underline mt-2 tracking-tight">Topic: Identification of photograph, WBCs malignant disorders</div>
                </div>

                <div class="flex items-center mt-8 mb-8 font-arial">
                    <div class="flex-grow border-t-2 border-dashed border-black"></div>
                    <span class="mx-2 font-bold text-[13px] text-black tracking-wide">(Cut along the dotted line)</span>
                    <div class="flex-grow border-t-2 border-dashed border-black"></div>
                </div>

                <div class="flex flex-col items-center gap-2 mb-8">
                    <img src="${stationData.url}" class="max-w-full max-h-[350px] object-contain">
                </div>

                <div class="border-t-2 border-dashed border-black mt-8 mb-2 font-arial"></div>
                
                <div class="flex justify-between font-bold text-sm text-black font-arial mt-1">
                    <div>Marks: 08</div>
                    <div>Time Allowed: ${isTimedMode ? '06' : '00'}</div>
                </div>
                <div class="font-bold text-sm mb-4 text-black font-arial">minutes</div>

                <div class="text-sm text-black font-arial">
                    <div class="font-bold underline text-[19px] mb-1">For Candidate:</div>
                    <div class="mb-5 text-justify leading-relaxed text-[15px]">${scenario.text}</div>

                    <div class="font-bold underline text-[19px] mb-1">Task:</div>
                    <div class="font-bold mb-3 text-[15px]">Carefully read and answer the following question:</div>
                    
                    <div class="space-y-1.5 text-[15px] w-full max-w-3xl">
                        <div class="flex justify-between items-start">
                            <div class="flex gap-2"><span>a.</span><span>${scenario.questions[0].q}</span></div>
                            <div class="font-bold whitespace-nowrap pl-4">(${scenario.questions[0].m})</div>
                        </div>
                        <div class="flex justify-between items-start">
                            <div class="flex gap-2"><span>b.</span><span>${scenario.questions[1].q}</span></div>
                            <div class="font-bold whitespace-nowrap pl-4">(${scenario.questions[1].m})</div>
                        </div>
                        <div class="flex justify-between items-start">
                            <div class="flex gap-2"><span>c.</span><span>${scenario.questions[2].q}</span></div>
                            <div class="font-bold whitespace-nowrap pl-4">(${scenario.questions[2].m})</div>
                        </div>
                    </div>
                </div>

                <!-- Answer Key (Appended dynamically, styled distinctly from paper) -->
                <div id="ospe-answer-key" class="hidden mt-10 p-5 bg-emerald-50 border border-emerald-200 rounded-xl text-sm text-emerald-900 shadow-inner font-sans">
                    <div class="flex items-center gap-2 mb-3">
                        <svg class="text-emerald-600" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <p class="font-black text-emerald-800 uppercase tracking-wide">Model Answer Key</p>
                    </div>
                    
                    <p class="mb-3"><span class="font-bold text-emerald-700 uppercase text-xs tracking-wider">Diagnosis:</span><br><span class="text-base font-semibold">${stationData.name}</span></p>
                    
                    <div class="mb-4">
                        <span class="font-bold text-emerald-700 uppercase text-xs tracking-wider">Specific Answers:</span>
                        <ul class="mt-2 space-y-2 text-emerald-800 bg-white/60 p-3 rounded-lg border border-emerald-100/50">
                            <li class="flex items-start gap-2"><span class="font-bold text-emerald-600">a.</span> <span>${scenario.answers[0]}</span></li>
                            <li class="flex items-start gap-2"><span class="font-bold text-emerald-600">b.</span> <span>${scenario.answers[1]}</span></li>
                            <li class="flex items-start gap-2"><span class="font-bold text-emerald-600">c.</span> <span>${scenario.answers[2]}</span></li>
                        </ul>
                    </div>
                    
                    <div class="border-t border-emerald-200/60 my-3 pt-3"></div>
                    <p class="mb-2"><span class="font-bold text-emerald-700 uppercase text-[10px] tracking-wider">Key Morphological Findings:</span><br>${stationData.points.join(', ')}</p>
                    <p><span class="font-bold text-emerald-700 uppercase text-[10px] tracking-wider">Robbins Reference:</span><br><span class="italic text-xs">${stationData.desc}</span></p>
                </div>
            `;
            document.getElementById('btn-show-ans').innerText = "Check Answer";
        }

        function toggleOspeAnswer() {
            const key = document.getElementById('ospe-answer-key');
            key.classList.toggle('hidden');
            document.getElementById('btn-show-ans').innerText = key.classList.contains('hidden') ? "Check Answer" : "Hide Key";
        }

        function nextOspeStation() {
            currentStationIndex = (currentStationIndex + 1) % ospeStations.length;
            renderOspeStation();
            resetTimer();
        }

        function startTimer() {
            resetTimer();
            if (!isTimedMode) {
                document.getElementById('timer-display').innerHTML = `
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                    <span>Practice</span>
                `;
                document.getElementById('timer-display').classList.remove('bg-red-500');
                document.getElementById('timer-display').classList.add('bg-indigo-600');
                return;
            }

            document.getElementById('timer-display').classList.add('bg-blue-600');
            document.getElementById('timer-display').classList.remove('bg-indigo-600');
            
            ospeTimer = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(ospeTimer);
                    alert("TIME UP! Move to the next station.");
                }
            }, 1000);
        }

        function resetTimer() {
            timeLeft = 360; // 6 mins matching printed paper
            if(isTimedMode) updateTimerDisplay();
        }

        function stopTimer() {
            if(ospeTimer) clearInterval(ospeTimer);
        }

        function updateTimerDisplay() {
            if (!isTimedMode) return;
            
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            const display = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            
            document.getElementById('timer-display').innerHTML = `
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span>${display}</span>
            `;
            
            // Critical warning
            if (timeLeft < 30) {
                document.getElementById('timer-display').classList.replace('bg-blue-600', 'bg-red-500');
                document.getElementById('timer-display').classList.add('animate-pulse');
            } else {
                document.getElementById('timer-display').classList.replace('bg-red-500', 'bg-blue-600');
                document.getElementById('timer-display').classList.remove('animate-pulse');
            }
        }

        // Initialize
        showView('dashboard');
    </script>
</body>
</html>
