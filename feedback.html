<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODMEDICALIS - Feedback</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #2563eb, #9333ea);
            --bg-color: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #cbd5e1;
            --star-inactive: #e2e8f0;
            --star-active: #fbbf24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* Dynamic Animated Background */
        body {
            background: linear-gradient(-45deg, #e0f2fe, #dbeafe, #ede9fe, #f3e8ff);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Form Container */
        .form-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .form-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.12);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        /* Colorful Brand Text */
        .brand {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            background: var(--primary-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            display: inline-block;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-main);
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        /* Dynamic Inputs */
        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        textarea:focus {
            border-color: #8b5cf6;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.15);
            transform: translateY(-2px);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* Pure CSS Animated Star Rating */
        .rating-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.5);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .stars {
            display: inline-flex;
            flex-direction: row-reverse; /* Allows hover logic to work backwards */
            gap: 8px;
        }

        .stars input {
            display: none;
        }

        .stars label {
            font-size: 38px;
            color: var(--star-inactive);
            cursor: pointer;
            transition: color 0.2s ease, transform 0.2s ease;
            text-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* Highlight stars on hover and when checked */
        .stars label:hover,
        .stars label:hover ~ label,
        .stars input:checked ~ label {
            color: var(--star-active);
        }

        /* Small pop animation on hover */
        .stars label:hover {
            transform: scale(1.15) rotate(-5deg);
        }

        /* Colorful Submit Button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-grad);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25);
            margin-top: 10px;
        }

        .submit-btn:hover {
            box-shadow: 0 12px 25px rgba(147, 51, 234, 0.35);
            transform: translateY(-2px);
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        @media (max-width: 480px) {
            .form-container {
                padding: 30px 20px;
            }
            .title {
                font-size: 22px;
            }
            .stars label {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="header">
            <div class="brand">MODMEDICALIS</div>
            <h1 class="title">Mind Your Minors<br>2nd Year MBBS Feedback</h1>
        </div>

        <!-- FormSubmit Action connected to your email -->
        <form action="https://formsubmit.co/hasnainmughal4200@gmail.com" method="POST">
            
            <!-- Hidden Fields for FormSubmit formatting -->
            <input type="hidden" name="_subject" value="New Feedback: Mind Your Minors 2nd Year MBBS!">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="_captcha" value="true"> <!-- Change to false to remove captcha -->

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="Name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address (Optional)</label>
                <input type="email" id="email" name="Email" placeholder="student@example.com">
            </div>

            <!-- Star Rating Section -->
            <div class="form-group">
                <label style="text-align: center; margin-bottom: 12px;">How would you rate your experience?</label>
                <div class="rating-wrapper">
                    <div class="stars">
                        <input type="radio" id="star5" name="Rating" value="5 Stars" required>
                        <label for="star5" title="5 stars">&#9733;</label>

                        <input type="radio" id="star4" name="Rating" value="4 Stars">
                        <label for="star4" title="4 stars">&#9733;</label>

                        <input type="radio" id="star3" name="Rating" value="3 Stars">
                        <label for="star3" title="3 stars">&#9733;</label>

                        <input type="radio" id="star2" name="Rating" value="2 Stars">
                        <label for="star2" title="2 stars">&#9733;</label>

                        <input type="radio" id="star1" name="Rating" value="1 Star">
                        <label for="star1" title="1 star">&#9733;</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="feedback">Your Feedback / Suggestions</label>
                <textarea id="feedback" name="Feedback_Comments" placeholder="Share your thoughts, learnings, or how we can improve..." required></textarea>
            </div>

            <button type="submit" class="submit-btn">Submit Feedback</button>
        </form>
    </div>

</body>
</html>
