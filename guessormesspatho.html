    <script>
        const rawData = [
            // WBC (20 Items)
            { cat:"WBC", url:"https://i.imgur.com/5oyEI4C.jpeg", name:"Reactive changes in neutrophils", desc:"Neutrophils containing coarse purple granules (toxic granulations) and blue patches (Döhle bodies).", points:["Toxic Granulations","Döhle bodies","Bacterial Sepsis context","Smear evidence"], sc:[{t:"A 25-year-old male presents with high-grade fever, chills, and purulent sputum. Peripheral blood smear shown.", q:[{q:"Identify the two specific morphological abnormalities.",m:4},{q:"What is the underlying clinical condition?",m:2},{q:"What are the blue cytoplasmic patches composed of?",m:2}], a:["Toxic granulations and Döhle bodies.","Severe bacterial infection / Sepsis.","Dilated endoplasmic reticulum."]},{t:"A 40-year-old woman is brought to the ICU following major burns. Leukocyte count is 25,000/μL.", q:[{q:"Comment on the morphology of the predominant cells.",m:4},{q:"Name the cytoplasmic patches.",m:2},{q:"What term describes this left-shifted response?",m:2}], a:["Neutrophils display toxic granulations and Döhle bodies.","Döhle bodies.","Leukemoid reaction."]}]},
            { cat:"WBC", url:"https://i.imgur.com/gk8F63b.jpeg", name:"Follicular hyperplasia", desc:"Low-power view showing reactive follicle and mantle zone. Dark zone shows mitotic figures and macrophages with apoptotic cells.", points:["Mantle zone","Dark zone mitoses","Tingible body macrophages","Polarized germinal center"], sc:[{t:"A 10-year-old boy presents with an enlarged cervical lymph node after streptococcal pharyngitis.", q:[{q:"What architectural feature is highlighted in region (A)?",m:4},{q:"What are the clear cells containing debris in region (B)?",m:2},{q:"Is this monoclonal or polyclonal?",m:2}], a:["Reactive secondary lymphoid follicle with prominent mantle zone.","Tingible body macrophages.","Polyclonal expansion."]},{t:"A 35-year-old female with Rheumatoid Arthritis develops generalized lymphadenopathy.", q:[{q:"Describe the morphological activity in the dark zone (B).",m:4},{q:"What do the apoptotic bodies represent?",m:2},{q:"What is the likely diagnosis?",m:2}], a:["High mitotic activity and tingible body macrophages.","Apoptotic B-cells that failed affinity maturation.","Reactive follicular hyperplasia."]}]},
            { cat:"WBC", url:"https://i.imgur.com/PfQ7Zzk.jpeg", name:"ALL", desc:"Lymphoblasts with condensed chromatin, small nucleoli, scant agranular cytoplasm. Flow: TdT+, CD22+, CD10+.", points:["Condensed chromatin","TdT positive","CD10/CD19/CD22+","Childhood presentation"], sc:[{t:"A 7-year-old boy has bone pain, hepatosplenomegaly. Lab shows anemia, thrombocytopenia, leukocytosis.", q:[{q:"Comment on the smear findings.",m:4},{q:"Comment on the flow scatter plot.",m:2},{q:"What is the diagnosis?",m:2}], a:["Smear shows lymphoblasts with condensed chromatin, scant agranular cytoplasm.","TdT and CD10/CD22 confirms B-cell lineage.","B-cell Acute Lymphoblastic Leukemia."]},{t:"A 4-year-old girl is brought in due to a limp and mucosal bleeding.", q:[{q:"What enzyme marker indicates immaturity?",m:4},{q:"Interpret the flow parameters.",m:2},{q:"Why the bone pain?",m:2}], a:["TdT.","Positive for early B-cell markers and TdT.","Massive expansion of marrow cavity by blasts."]}]},
            { cat:"WBC", url:"https://i.imgur.com/DLZGT6F.jpeg", name:"SLL/CLL (Lymph Node)", desc:"Low-power diffuse effacement. Small round lymphocytes. Arrow indicates a prolymphocyte.", points:["Architecture effacement","Small round lymphocytes","Prolymphocytes present","B-cell indolent"], sc:[{t:"A 65-year-old male presents with painless generalized lymphadenopathy. Node biopsy shown.", q:[{q:"Describe the architecture (A) and infiltrate (B).",m:4},{q:"Identify the specific cell (arrow).",m:2},{q:"What is the diagnosis?",m:2}], a:["(A) diffuse effacement. (B) monotonous small round lymphocytes.","Prolymphocyte (prominent central nucleolus).","Small Lymphocytic Lymphoma (SLL/CLL)."]},{t:"A 70-year-old female presents with autoimmune hemolytic anemia and enlarged lymph nodes.", q:[{q:"Comment on the cells in (B).",m:4},{q:"What is the significance of the cell (arrow)?",m:2},{q:"Classic surface markers?",m:2}], a:["Monotonous, small, mature-appearing lymphocytes.","Prolymphocytes; aggregates form proliferation centers.","CD5 and CD23 co-expression."]}]},
            { cat:"WBC", url:"https://i.imgur.com/44oXwkQ.jpeg", name:"CLL (Smear)", desc:"Smear flooded with small lymphocytes. Smudge cells present. Spherocytes due to AIHA.", points:["Smudge cells","Cracked-nut chromatin","Coexistent AIHA","Nucleated RBCs"], sc:[{t:"A 68-year-old asymptomatic male has a WBC count of 60,000/μL. Smear shown.", q:[{q:"Identify the disrupted structures.",m:4},{q:"Describe the intact lymphocytes.",m:2},{q:"Diagnosis?",m:2}], a:["Smudge cells.","Small, mature-appearing lymphocytes with condensed cracked-nut chromatin.","Chronic Lymphocytic Leukemia."]},{t:"A 72-year-old female presents with jaundice, lymphocytosis, and positive direct Coombs test.", q:[{q:"What RBC morphology explains jaundice?",m:4},{q:"Identify the disrupted cells.",m:2},{q:"What complication is occurring?",m:2}], a:["Spherocytes.","Smudge cells.","Secondary AIHA complicating CLL."]}]},
            { cat:"WBC", url:"https://i.imgur.com/gbpNDSk.jpeg", name:"CLL (Liver)", desc:"Periportal lymphocytic infiltrate involving the liver.", points:["Periportal infiltrate","Sinusoid infiltration","Systemic B-cell","Indolent progression"], sc:[{t:"A 70-year-old male with known CLL presents with mild hepatomegaly. Liver biopsy shown.", q:[{q:"Describe the pattern of the infiltrate.",m:4},{q:"Which zones are expanded?",m:2},{q:"What type of cells make up this infiltrate?",m:2}], a:["Dense, monotonous lymphocytic infiltrate.","Portal tracts (periportal areas).","Small, mature neoplastic B-lymphocytes."]},{t:"An elderly female undergoes a liver biopsy showing a dense mononuclear infiltrate.", q:[{q:"Comment on the morphology shown.",m:4},{q:"What systemic disorder is likely?",m:2},{q:"What would peripheral blood show?",m:2}], a:["Prominent periportal accumulation of small lymphocytes.","CLL/SLL.","Absolute lymphocytosis with smudge cells."]}]},
            { cat:"WBC", url:"https://i.imgur.com/cPDPViP.jpeg", name:"Follicular lymphoma", desc:"Nodular aggregates. Mix of Centrocytes (cleaved) and Centroblasts (nucleoli).", points:["Nodular growth","Centrocytes","Centroblasts","t(14;18) BCL2+"], sc:[{t:"A 55-year-old female presents with waxing/waning cervical lymphadenopathy. Biopsy shown.", q:[{q:"Describe architecture (A) and cells (B).",m:4},{q:"Hallmark translocation?",m:2},{q:"Diagnosis?",m:2}], a:["(A) Nodular pattern. (B) Mix of small cleaved cells and larger cells with nucleoli.","t(14;18) involving BCL2.","Follicular Lymphoma."]},{t:"A 60-year-old male is found to have asymptomatic lymphadenopathy.", q:[{q:"Comment on (A) and the 'cleaved' cells (B).",m:4},{q:"Why do cells accumulate?",m:2},{q:"Indolent or aggressive?",m:2}], a:["(A) Nodular aggregates. (B) Centrocytes.","Overexpression of anti-apoptotic BCL2.","Indolent."]}]},

        let selectedCategory = 'ALL';
        let isBlindMode = false;
        let activeDeck = [];
        let ospeStations = [];
        let currentCardIndex = 0;
        let currentStationIndex = 0;
        let ospeTimer = null;
        let timeLeft = 360;
        let isTimedMode = true;

        function initApp() {
            updateCategory();
            showView('dashboard');
        }

        function updateCategory() {
            selectedCategory = document.querySelector('input[name="module-cat"]:checked').value;
            filterData();
        }

        function updateBlindMode() {
            isBlindMode = document.getElementById('blind-mode-toggle').checked;
            renderStationList();
            if(!document.getElementById('view-ospe-exam').classList.contains('hidden')) renderOspeStation();
        }

        function updateModeSelection() {
            isTimedMode = document.getElementById('mode-timed').checked;
        }

        function filterData() {
            activeDeck = rawData.filter(i => selectedCategory === 'ALL' || i.cat === selectedCategory);
            ospeStations = activeDeck.flatMap(item => item.sc.map(scenario => ({
                url: item.url, name: item.name, desc: item.desc, points: item.points, scenario: scenario
            })));
            document.getElementById('flashcard-count').innerText = activeDeck.length;
            document.getElementById('ospe-count').innerText = ospeStations.length;
            document.getElementById('lobby-station-count').innerText = ospeStations.length;
            currentCardIndex = 0; currentStationIndex = 0;
            renderStationList();
            if(!document.getElementById('view-flashcards').classList.contains('hidden')) renderCard();
        }

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${viewId}`).classList.remove('hidden');
            if(viewId === 'flashcards') renderCard();
            if(viewId === 'ospe-lobby') renderStationList();
            stopTimer();
        }

        function renderCard() {
            if(activeDeck.length === 0) return;
            const container = document.getElementById('card-container');
            const item = activeDeck[currentCardIndex];
            container.innerHTML = `
                <div class="flashcard w-full h-full relative cursor-pointer group" onclick="this.classList.toggle('flipped')">
                    <div class="flashcard-inner relative w-full h-full">
                        <div class="absolute inset-0 bg-white border border-slate-200 rounded-[2rem] p-5 flex flex-col backface-hidden shadow-lg group-hover:shadow-xl transition-shadow">
                            <div class="flex-1 flex items-center justify-center overflow-hidden bg-slate-50 rounded-2xl border border-slate-100">
                                <img src="${item.url}" class="max-h-full rounded-xl object-contain mix-blend-multiply">
                            </div>
                            <div class="mt-5 text-center shrink-0">
                                <span class="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em]">${item.cat} Slide</span>
                                <p class="text-slate-400 text-xs mt-2 font-medium">Tap to reveal diagnosis</p>
                            </div>
                        </div>
                        <div class="absolute inset-0 bg-gradient-to-br from-slate-900 to-slate-800 text-white border border-slate-700 rounded-[2rem] p-6 md:p-8 flex flex-col backface-hidden rotate-y-180 shadow-2xl overflow-y-auto flashcard-scroll">
                            <h3 class="text-xl md:text-2xl font-black text-blue-400 mb-4 border-b border-slate-700/50 pb-3 leading-tight shrink-0">${item.name}</h3>
                            <p class="text-sm text-slate-300 italic mb-5 leading-relaxed bg-white/5 p-4 rounded-xl border border-white/10 shrink-0">${item.desc}</p>
                            <div class="space-y-3.5 mt-auto flex-1">
                                ${item.points.map(p => `<div class="flex gap-3 text-sm font-medium items-start"><div class="w-1.5 h-1.5 rounded-full bg-blue-500 mt-1.5 shrink-0 shadow-[0_0_8px_rgba(59,130,246,0.8)]"></div><span class="text-slate-200">${p}</span></div>`).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function nextCard() { if(activeDeck.length) { currentCardIndex = (currentCardIndex + 1) % activeDeck.length; renderCard(); } }
        function prevCard() { if(activeDeck.length) { currentCardIndex = (currentCardIndex - 1 + activeDeck.length) % activeDeck.length; renderCard(); } }
        function shuffleDeck() { activeDeck.sort(() => Math.random() - 0.5); currentCardIndex = 0; renderCard(); }

        function renderStationList() {
            const list = document.getElementById('ospe-station-list');
            list.innerHTML = ospeStations.map((d, i) => `
                <div onclick="startOspe(${i})" class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-blue-200 flex justify-between items-center cursor-pointer transition-all hover:-translate-y-0.5 group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center text-sm font-bold group-hover:bg-blue-600 group-hover:text-white transition-colors">${i+1}</div>
                        <span class="font-bold text-slate-700 group-hover:text-slate-900 transition-colors">${isBlindMode ? `Test Station ${i+1}` : d.name}</span>
                    </div>
                    <svg class="text-slate-300 group-hover:text-blue-500 transition-colors" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
                </div>
            `).join('');
        }

        function startOspe(index) {
            currentStationIndex = index;
            showView('ospe-exam');
            startTimer();
            renderOspeStation();
        }

        function renderOspeStation() {
            if(ospeStations.length === 0) return;
            const paper = document.getElementById('ospe-paper-content');
            const station = ospeStations[currentStationIndex];
            const sc = station.scenario;
            const topicText = isBlindMode ? "Hidden (Blind Mode)" : station.name;

            paper.innerHTML = `
                <div class="text-center font-bold mb-4 text-black font-arial">
                    <div class="text-lg tracking-wide italic">Objectively Structured Performance Evaluation</div>
                    <div class="text-[22px] underline mt-1 decoration-2 underline-offset-2">Observed Station ${currentStationIndex + 1}</div>
                </div>
                <div class="flex justify-between font-bold text-sm text-black font-arial">
                    <div>Marks: 08</div><div>Time Allowed: ${isTimedMode ? '06' : '00'}</div>
                </div>
                <div class="font-bold text-sm mb-4 text-black font-arial">minutes</div>
                <div class="text-sm text-black font-arial">
                    <div class="font-bold underline text-lg">For Organizer:</div>
                    <div class="flex gap-1 md:gap-8 text-sm mb-2 mt-2 flex-wrap"><span>1. Response Sheet</span><span>2. Pen</span><span>3. Table</span><span>4. Chair</span></div>
                    <div class="font-bold text-base underline mt-2 tracking-tight">Topic: Identification of ${topicText}</div>
                </div>
                <div class="flex items-center mt-8 mb-8 font-arial">
                    <div class="flex-grow border-t-2 border-dashed border-black"></div>
                    <span class="mx-2 font-bold text-[13px] text-black tracking-wide">(Cut along dotted line)</span>
                    <div class="flex-grow border-t-2 border-dashed border-black"></div>
                </div>
                <div class="flex flex-col items-center gap-2 mb-8"><img src="${station.url}" class="max-w-full max-h-[350px] object-contain"></div>
                <div class="border-t-2 border-dashed border-black mt-8 mb-2 font-arial"></div>
                <div class="flex justify-between font-bold text-sm text-black font-arial mt-1">
                    <div>Marks: 08</div><div>Time Allowed: ${isTimedMode ? '06' : '00'}</div>
                </div>
                <div class="font-bold text-sm mb-4 text-black font-arial">minutes</div>
                <div class="text-sm text-black font-arial">
                    <div class="font-bold underline text-[19px] mb-1">For Candidate:</div>
                    <div class="mb-5 text-justify leading-relaxed text-[15px]">${sc.t}</div>
                    <div class="font-bold underline text-[19px] mb-1">Task:</div>
                    <div class="space-y-1.5 text-[15px] mt-2 w-full max-w-3xl">
                        <div class="flex justify-between items-start"><div class="flex gap-2"><span>a.</span><span>${sc.q[0].q}</span></div><div class="font-bold pl-4">(${sc.q[0].m})</div></div>
                        <div class="flex justify-between items-start"><div class="flex gap-2"><span>b.</span><span>${sc.q[1].q}</span></div><div class="font-bold pl-4">(${sc.q[1].m})</div></div>
                        <div class="flex justify-between items-start"><div class="flex gap-2"><span>c.</span><span>${sc.q[2].q}</span></div><div class="font-bold pl-4">(${sc.q[2].m})</div></div>
                    </div>
                </div>
                <div id="ospe-answer-key" class="hidden mt-10 p-5 bg-emerald-50 border border-emerald-200 rounded-xl text-sm text-emerald-900 shadow-inner font-sans">
                    <div class="flex items-center gap-2 mb-3"><svg class="text-emerald-600" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><p class="font-black text-emerald-800 uppercase tracking-wide">Model Answer Key</p></div>
                    <p class="mb-3"><span class="font-bold text-emerald-700 uppercase text-xs tracking-wider">Diagnosis:</span><br><span class="text-base font-semibold">${station.name}</span></p>
                    <ul class="space-y-2 text-emerald-800 bg-white/60 p-3 rounded-lg border border-emerald-100/50 mb-3">
                        <li class="flex items-start gap-2"><span class="font-bold text-emerald-600">a.</span><span>${sc.a[0]}</span></li>
                        <li class="flex items-start gap-2"><span class="font-bold text-emerald-600">b.</span><span>${sc.a[1]}</span></li>
                        <li class="flex items-start gap-2"><span class="font-bold text-emerald-600">c.</span><span>${sc.a[2]}</span></li>
                    </ul>
                    <p class="mb-2"><span class="font-bold text-emerald-700 uppercase text-[10px] tracking-wider">Key Findings:</span><br>${station.points.join(', ')}</p>
                </div>
            `;
            document.getElementById('btn-show-ans').innerText = "Check Answer";
        }

        function toggleOspeAnswer() {
            const key = document.getElementById('ospe-answer-key');
            key.classList.toggle('hidden');
            document.getElementById('btn-show-ans').innerText = key.classList.contains('hidden') ? "Check Answer" : "Hide Key";
        }

        function nextOspeStation() {
            currentStationIndex = (currentStationIndex + 1) % ospeStations.length;
            renderOspeStation();
            resetTimer();
        }

        function startTimer() {
            resetTimer();
            if(!isTimedMode) {
                document.getElementById('timer-display').innerHTML = `<svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg><span>Practice</span>`;
                document.getElementById('timer-display').className = "bg-indigo-600 text-white px-5 py-2 rounded-full font-mono font-bold text-lg shadow-md flex items-center gap-2 border border-indigo-400/50";
                return;
            }
            document.getElementById('timer-display').className = "bg-blue-600 text-white px-5 py-2 rounded-full font-mono font-bold text-lg shadow-md flex items-center gap-2 border border-blue-400/50";
            ospeTimer = setInterval(() => {
                timeLeft--; updateTimerDisplay();
                if(timeLeft <= 0) { clearInterval(ospeTimer); alert("TIME UP! Move to the next station."); }
            }, 1000);
        }

        function resetTimer() { timeLeft = 360; if(isTimedMode) updateTimerDisplay(); }
        function stopTimer() { if(ospeTimer) clearInterval(ospeTimer); }

        function updateTimerDisplay() {
            if(!isTimedMode) return;
            const mins = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const secs = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span>${mins}:${secs}</span>`;
            
            if(timeLeft < 30) {
                document.getElementById('timer-display').classList.replace('bg-blue-600', 'bg-red-500');
                document.getElementById('timer-display').classList.add('animate-pulse');
            } else {
                document.getElementById('timer-display').classList.replace('bg-red-500', 'bg-blue-600');
                document.getElementById('timer-display').classList.remove('animate-pulse');
            }
        }

        initApp();
    </script>
</body>
</html>
