<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBBS MCQ Master Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .tab-active { border-bottom: 3px solid #6366f1; color: #6366f1; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto space-y-8">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg">
                    <i data-lucide="database" class="w-8 h-8"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-black tracking-tight text-slate-800">MCQ Master Processor</h1>
                    <p class="text-slate-500 font-medium">Tag, Parse & Export Medical Question Banks</p>
                </div>
            </div>
            <div class="bg-white px-5 py-3 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-3">
                <div class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></div>
                <span id="entry-count" class="text-sm font-bold text-slate-700">0 Questions Staged</span>
            </div>
        </header>

        <!-- Tabs -->
        <nav class="flex border-b border-slate-200 gap-8">
            <button onclick="switchTab('builder')" id="tab-btn-builder" class="pb-4 text-sm font-bold transition-all tab-active">MCQ Parser</button>
            <button onclick="switchTab('history')" id="tab-btn-history" class="pb-4 text-sm font-bold text-slate-400 transition-all hover:text-slate-600">Session History</button>
        </nav>

        <div id="tab-content-builder" class="space-y-8">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- LEFT: META DATA -->
                <div class="lg:col-span-4 space-y-6">
                    <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 space-y-5">
                        <h2 class="text-xl font-bold flex items-center gap-2 text-indigo-600">
                            <i data-lucide="tag" class="w-5 h-5"></i> Context Tags
                        </h2>
                        
                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-1">
                                    <label class="text-[10px] font-black text-slate-400 uppercase">Year</label>
                                    <select id="input-year" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500">
                                        <option>1st Year</option><option>2nd Year</option><option>3rd Year</option><option>4th Year</option><option>Final Year</option>
                                    </select>
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[10px] font-black text-slate-400 uppercase">Block</label>
                                    <select id="input-block" onchange="renderModules()" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500">
                                        <!-- JS Generated -->
                                    </select>
                                </div>
                            </div>

                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-slate-400 uppercase">Module Name</label>
                                <select id="input-module-select" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500"></select>
                                <input type="text" id="input-custom-module" placeholder="Or type new module..." class="mt-2 w-full p-2 text-xs border rounded-lg">
                            </div>

                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-slate-400 uppercase">Subject</label>
                                <select id="input-subject" class="w-full p-3 bg-slate-50 border-none rounded-xl outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500"></select>
                                <input type="text" id="input-custom-subject" placeholder="Or type new subject..." class="mt-2 w-full p-2 text-xs border rounded-lg">
                            </div>
                        </div>
                    </section>

                    <section class="bg-indigo-900 p-6 rounded-3xl shadow-xl text-white space-y-4">
                        <h2 class="text-lg font-bold flex items-center gap-2">
                            <i data-lucide="upload" class="w-5 h-5"></i> Import JSON
                        </h2>
                        <textarea id="import-area" placeholder="Paste existing MCQ JSON..." class="w-full h-32 p-3 bg-indigo-800/50 border border-indigo-700 rounded-xl text-xs font-mono outline-none"></textarea>
                        <button onclick="importJSON()" class="w-full py-2 bg-white text-indigo-900 rounded-xl font-bold hover:bg-indigo-50">Load for Editing</button>
                    </section>
                </div>

                <!-- RIGHT: PARSER -->
                <div class="lg:col-span-8 space-y-6">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 space-y-6">
                        <h2 class="text-xl font-bold text-slate-800">Raw MCQ Input</h2>
                        <div class="space-y-4">
                            <textarea id="raw-mcq-input" class="w-full h-64 p-4 bg-slate-50 border-none rounded-2xl ring-1 ring-slate-200 outline-none font-mono text-xs" placeholder="[LO]: HL-Pa-001...&#10;[SRC]: Robbins...&#10;[DIFF]: Easy...&#10;[Q]: Question?...&#10;[A]: Option...&#10;[ANS]: B..."></textarea>
                            <button onclick="processMCQs()" class="w-full py-4 bg-slate-800 text-white rounded-2xl font-black text-lg hover:bg-slate-700 transition-all shadow-xl">
                                Parse & Validate Questions
                            </button>
                        </div>

                        <div id="parsed-preview-container" class="space-y-4 pt-4 border-t border-slate-100 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar hidden">
                            <!-- Preview cards injected here -->
                        </div>
                        
                        <div id="stage-btn-container" class="pt-6 hidden">
                            <button onclick="saveToSession()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black text-lg flex items-center justify-center gap-3 shadow-xl hover:bg-indigo-700 transition-all">
                                <i data-lucide="save" class="w-6 h-6"></i> Stage to Session
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- REVIEW & FILTERING -->
            <section id="review-section" class="hidden bg-slate-900 rounded-[40px] p-8 md:p-12 text-white space-y-8 shadow-2xl">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                    <div>
                        <h2 class="text-3xl font-black">Final Bank Review</h2>
                        <div class="flex flex-wrap gap-4 mt-4">
                            <select id="filter-module" onchange="renderSession()" class="bg-slate-800 border-none rounded-lg text-xs p-2 text-slate-300 ring-1 ring-slate-700"><option value="">All Modules</option></select>
                            <select id="filter-subject" onchange="renderSession()" class="bg-slate-800 border-none rounded-lg text-xs p-2 text-slate-300 ring-1 ring-slate-700"><option value="">All Subjects</option></select>
                            <select id="filter-diff" onchange="renderSession()" class="bg-slate-800 border-none rounded-lg text-xs p-2 text-slate-300 ring-1 ring-slate-700"><option value="">All Difficulties</option><option>Easy</option><option>Medium</option><option>Hard</option></select>
                        </div>
                    </div>
                    <div class="flex gap-4">
                        <button onclick="resetSession()" class="px-6 py-4 rounded-2xl border border-slate-700 text-slate-400 hover:text-red-400 transition-all font-bold">Clear All</button>
                        <button onclick="copyMasterJSON()" class="px-10 py-4 bg-indigo-500 hover:bg-indigo-400 text-white rounded-2xl font-black text-xl flex items-center gap-3 transition-all">
                            <i data-lucide="file-json" class="w-6 h-6"></i> COPY JSON
                        </button>
                    </div>
                </div>

                <div id="session-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- MCQ Cards -->
                </div>
            </section>
        </div>

        <!-- HISTORY -->
        <div id="tab-content-history" class="hidden space-y-6">
            <div class="bg-white p-8 rounded-[40px] border border-slate-200 shadow-sm space-y-6">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-black">Session Archive</h2>
                    <button onclick="saveCurrentToHistory()" class="px-6 py-3 bg-indigo-50 text-indigo-600 rounded-xl font-bold">Archive Current Bank</button>
                </div>
                <div id="history-list" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
            </div>
        </div>
    </div>

    <script>
        const MBBS_SUBJECTS = ["General Anatomy", "Embryology", "Histology", "Physiology", "Biochemistry", "Pathology", "Microbiology", "Pharmacology", "Community Medicine", "Medicine", "Surgery"];
        const PREDEFINED_MODULES = { "1": ["Foundation-I", "Hematology"], "7": ["Foundation-II", "General Pharmacology"] };

        let state = {
            session: JSON.parse(localStorage.getItem('mcq_session') || '[]'),
            history: JSON.parse(localStorage.getItem('mcq_history') || '[]'),
            customModules: JSON.parse(localStorage.getItem('mcq_custom_mods') || '{}'),
            customSubjects: JSON.parse(localStorage.getItem('mcq_custom_subs') || '[]'),
            stagedQuestions: []
        };

        function init() {
            const blockSelect = document.getElementById('input-block');
            for(let i=1; i<=15; i++) {
                const opt = document.createElement('option');
                opt.value = i; opt.textContent = `Block ${i}`;
                blockSelect.appendChild(opt);
            }
            renderModules();
            renderSubjects();
            renderSession();
            renderHistory();
            lucide.createIcons();
        }

        function switchTab(tab) {
            document.getElementById('tab-content-builder').classList.toggle('hidden', tab !== 'builder');
            document.getElementById('tab-content-history').classList.toggle('hidden', tab !== 'history');
            document.getElementById('tab-btn-builder').classList.toggle('tab-active', tab === 'builder');
            document.getElementById('tab-btn-history').classList.toggle('tab-active', tab === 'history');
        }

        function renderModules() {
            const block = document.getElementById('input-block').value;
            const sel = document.getElementById('input-module-select');
            sel.innerHTML = '';
            const mods = [...(PREDEFINED_MODULES[block] || []), ...(state.customModules[block] || [])];
            mods.forEach(m => sel.add(new Option(m, m)));
        }

        function renderSubjects() {
            const sel = document.getElementById('input-subject');
            sel.innerHTML = '';
            [...MBBS_SUBJECTS, ...state.customSubjects].forEach(s => sel.add(new Option(s, s)));
        }

        function processMCQs() {
            const raw = document.getElementById('raw-mcq-input').value;
            // Enhanced Regex to handle potential spacing/comma variations
            const mcqBlocks = raw.split(/\n\s*\n/);
            state.stagedQuestions = [];

            mcqBlocks.forEach(block => {
                const q = {};
                q.id = crypto.randomUUID().split('-')[0].toUpperCase();
                q.lo = block.match(/\[LO\]:\s*(.*)/i)?.[1].trim() || "Unspecified";
                q.source = block.match(/\[SRC\]:\s*(.*)/i)?.[1].trim() || "Unknown";
                q.difficulty = block.match(/\[DIFF\]:\s*(.*)/i)?.[1].trim() || "Medium";
                q.question = block.match(/\[Q\]:\s*(.*)/i)?.[1].trim() || "";
                q.ans = block.match(/\[ANS\]:\s*(.*)/i)?.[1].trim() || "";
                q.explanation = block.match(/\[EXP\]:\s*([\s\S]*)/i)?.[1].trim() || "";
                
                q.options = {
                    A: block.match(/\[A\]:\s*(.*)/i)?.[1].trim() || "",
                    B: block.match(/\[B\]:\s*(.*)/i)?.[1].trim() || "",
                    C: block.match(/\[C\]:\s*(.*)/i)?.[1].trim() || "",
                    D: block.match(/\[D\]:\s*(.*)/i)?.[1].trim() || "",
                    E: block.match(/\[E\]:\s*(.*)/i)?.[1].trim() || ""
                };

                if(q.question) state.stagedQuestions.push(q);
            });

            renderPreview();
        }

        function renderPreview() {
            const container = document.getElementById('parsed-preview-container');
            container.innerHTML = '';
            container.classList.remove('hidden');
            document.getElementById('stage-btn-container').classList.remove('hidden');

            state.stagedQuestions.forEach((q, idx) => {
                const div = document.createElement('div');
                div.className = "p-4 border border-slate-200 rounded-xl bg-slate-50 text-xs space-y-2";
                div.innerHTML = `
                    <div class="flex justify-between font-bold text-indigo-600">
                        <span>#${idx+1} | LO: ${q.lo}</span>
                        <span>${q.difficulty}</span>
                    </div>
                    <p class="font-bold">${q.question}</p>
                    <div class="grid grid-cols-2 gap-2 opacity-60">
                        <span>A: ${q.options.A}</span><span>B: ${q.options.B}</span>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function saveToSession() {
            const year = document.getElementById('input-year').value;
            const block = `Block ${document.getElementById('input-block').value}`;
            const module = document.getElementById('input-custom-module').value || document.getElementById('input-module-select').value;
            const subject = document.getElementById('input-custom-subject').value || document.getElementById('input-subject').value;

            // Update custom lists if needed
            if(document.getElementById('input-custom-module').value) {
                const bNum = document.getElementById('input-block').value;
                if(!state.customModules[bNum]) state.customModules[bNum] = [];
                state.customModules[bNum].push(module);
            }
            if(document.getElementById('input-custom-subject').value) {
                state.customSubjects.push(subject);
            }

            const formatted = state.stagedQuestions.map(q => ({
                ...q,
                meta: { year, block, module, subject }
            }));

            state.session = [...state.session, ...formatted];
            localStorage.setItem('mcq_session', JSON.stringify(state.session));
            localStorage.setItem('mcq_custom_mods', JSON.stringify(state.customModules));
            localStorage.setItem('mcq_custom_subs', JSON.stringify(state.customSubjects));

            state.stagedQuestions = [];
            document.getElementById('raw-mcq-input').value = '';
            document.getElementById('parsed-preview-container').classList.add('hidden');
            document.getElementById('stage-btn-container').classList.add('hidden');
            
            renderSession();
            renderModules();
            renderSubjects();
        }

        function renderSession() {
            const list = document.getElementById('session-list');
            const section = document.getElementById('review-section');
            const count = document.getElementById('entry-count');
            
            count.textContent = `${state.session.length} Questions Staged`;
            if(state.session.length === 0) {
                section.classList.add('hidden');
                return;
            }
            section.classList.remove('hidden');

            // Update filters
            const fMod = document.getElementById('filter-module');
            const fSub = document.getElementById('filter-subject');
            const curMod = fMod.value;
            const curSub = fSub.value;
            
            const mods = [...new Set(state.session.map(q => q.meta.module))];
            const subs = [...new Set(state.session.map(q => q.meta.subject))];
            
            fMod.innerHTML = '<option value="">All Modules</option>';
            fSub.innerHTML = '<option value="">All Subjects</option>';
            mods.forEach(m => fMod.add(new Option(m,m)));
            subs.forEach(s => fSub.add(new Option(s,s)));
            fMod.value = curMod; fSub.value = curSub;

            // Apply Filters
            const filtered = state.session.filter(q => {
                return (!fMod.value || q.meta.module === fMod.value) &&
                       (!fSub.value || q.meta.subject === fSub.value) &&
                       (!document.getElementById('filter-diff').value || q.difficulty === document.getElementById('filter-diff').value);
            });

            list.innerHTML = '';
            filtered.forEach((q, idx) => {
                const div = document.createElement('div');
                div.className = "bg-slate-800 border border-slate-700 rounded-2xl p-6 space-y-4 relative group";
                div.innerHTML = `
                    <button onclick="removeQuestion('${q.id}')" class="absolute top-4 right-4 text-slate-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity">
                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                    </button>
                    <div class="flex flex-wrap gap-2">
                        <span class="text-[9px] bg-indigo-500 text-white px-2 py-0.5 rounded font-black uppercase">${q.meta.module}</span>
                        <span class="text-[9px] bg-slate-700 text-slate-300 px-2 py-0.5 rounded uppercase">${q.meta.subject}</span>
                        <span class="text-[9px] border border-slate-600 text-slate-400 px-2 py-0.5 rounded uppercase">ID: ${q.id}</span>
                    </div>
                    <div class="space-y-2">
                        <p class="text-sm font-bold text-slate-100">${q.question}</p>
                        <div class="grid grid-cols-1 gap-1 text-xs text-slate-400">
                            <div class="${q.ans === 'A' ? 'text-green-400 font-bold' : ''}">A) ${q.options.A}</div>
                            <div class="${q.ans === 'B' ? 'text-green-400 font-bold' : ''}">B) ${q.options.B}</div>
                            <div class="${q.ans === 'C' ? 'text-green-400 font-bold' : ''}">C) ${q.options.C}</div>
                            <div class="${q.ans === 'D' ? 'text-green-400 font-bold' : ''}">D) ${q.options.D}</div>
                            <div class="${q.ans === 'E' ? 'text-green-400 font-bold' : ''}">E) ${q.options.E}</div>
                        </div>
                    </div>
                    <div class="pt-3 border-t border-slate-700 text-[10px] text-slate-500 italic">
                        LO: ${q.lo} | Source: ${q.source}
                    </div>
                `;
                list.appendChild(div);
            });
            lucide.createIcons();
        }

        function removeQuestion(id) {
            state.session = state.session.filter(q => q.id !== id);
            localStorage.setItem('mcq_session', JSON.stringify(state.session));
            renderSession();
        }

        function resetSession() {
            if(confirm("Wipe current bank?")) {
                state.session = [];
                localStorage.removeItem('mcq_session');
                renderSession();
            }
        }

        function copyMasterJSON() {
            const blob = { 
                bankMetadata: { count: state.session.length, generated: new Date().toISOString() },
                questions: state.session 
            };
            const json = JSON.stringify(blob, null, 2);
            navigator.clipboard.writeText(json).then(() => alert("Master JSON copied to clipboard!"));
        }

        function importJSON() {
            try {
                const raw = document.getElementById('import-area').value;
                const data = JSON.parse(raw);
                const imported = data.questions || (Array.isArray(data) ? data : []);
                state.session = [...state.session, ...imported];
                localStorage.setItem('mcq_session', JSON.stringify(state.session));
                renderSession();
                alert("Import successful!");
            } catch(e) { alert("Invalid JSON."); }
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            state.history.forEach((h, idx) => {
                const div = document.createElement('div');
                div.className = "p-4 bg-white border border-slate-200 rounded-2xl space-y-3";
                div.innerHTML = `
                    <h4 class="font-bold text-sm">${h.name}</h4>
                    <p class="text-[10px] text-slate-400">${h.date}</p>
                    <div class="flex justify-between items-center pt-2">
                        <span class="text-xs font-bold text-indigo-600">${h.count} Qs</span>
                        <div class="flex gap-2">
                            <button onclick="loadHistory(${idx})" class="p-2 bg-indigo-50 text-indigo-600 rounded-lg"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
                            <button onclick="deleteHistory(${idx})" class="p-2 bg-red-50 text-red-600 rounded-lg"><i data-lucide="trash" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
            lucide.createIcons();
        }

        function saveCurrentToHistory() {
            if(state.session.length === 0) return;
            const name = prompt("Session Name?", `Bank ${new Date().toLocaleDateString()}`);
            if(!name) return;
            state.history.unshift({ name, date: new Date().toLocaleString(), count: state.session.length, data: state.session });
            localStorage.setItem('mcq_history', JSON.stringify(state.history));
            renderHistory();
        }

        function loadHistory(idx) {
            state.session = state.history[idx].data;
            renderSession();
            switchTab('builder');
        }

        function deleteHistory(idx) {
            state.history.splice(idx, 1);
            localStorage.setItem('mcq_history', JSON.stringify(state.history));
            renderHistory();
        }

        window.onload = init;
    </script>
</body>
</html>
